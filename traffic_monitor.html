<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流量监控</title>
    <style>
        :root {
            --bg-primary: #0D0D0D;
            --bg-secondary: #1A1A1A;
            --bg-tertiary: #262626;
            --accent: #F68320;
            --text-primary: #FFFFFF;
            --text-secondary: #A3A3A3;
            --text-tertiary: #737373;
            --border: rgba(255,255,255,0.08);
            --ipv4-direct: #3b82f6;
            --ipv6-direct: #22C55E;
            --ipv4-warp: #F59E0B;
            --ipv6-warp: #EF4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            width: 100vw; height: 100vh;
            user-select: none;
        }
        input { user-select: text; -webkit-app-region: no-drag; }
        .container { width: 100%; height: 100%; display: flex; flex-direction: column; }

        /* 标题栏 */
        .title-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 16px; background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            -webkit-app-region: drag;
        }
        .title-bar-text { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
        .title-bar-btns { display: flex; gap: 6px; -webkit-app-region: no-drag; }
        .title-bar-btn {
            width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
            border: none; background: transparent; border-radius: 4px; cursor: pointer;
            color: var(--text-tertiary); transition: all 0.15s; padding: 0;
        }
        .title-bar-btn:hover { background: var(--bg-tertiary); color: var(--text-secondary); }
        .title-bar-btn.close:hover { background: rgba(239,68,68,0.2); color: var(--ipv6-warp); }
        .title-bar-btn svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

        /* 统计卡片 */
        .stats-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
            padding: 12px;
        }
        .stat-card {
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px 10px; text-align: center;
            transition: border-color 0.2s;
        }
        .stat-card:hover { border-color: var(--accent); }
        .stat-card .stat-icon { font-size: 18px; margin-bottom: 4px; }
        .stat-card .stat-count { font-size: 24px; font-weight: 700; line-height: 1.2; }
        .stat-card .stat-label { font-size: 10px; color: var(--text-tertiary); margin-top: 2px; }
        .stat-card.ipv4-direct .stat-count { color: var(--ipv4-direct); }
        .stat-card.ipv6-direct .stat-count { color: var(--ipv6-direct); }
        .stat-card.ipv4-warp .stat-count { color: var(--ipv4-warp); }
        .stat-card.ipv6-warp .stat-count { color: var(--ipv6-warp); }

        /* 工具栏 */
        .toolbar {
            display: flex; align-items: center; gap: 8px;
            padding: 0 12px 8px; flex-wrap: wrap;
        }
        .search-input {
            flex: 1; min-width: 120px; padding: 6px 10px;
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text-primary); font-size: 12px; outline: none;
        }
        .search-input:focus { border-color: var(--accent); }
        .search-input::placeholder { color: var(--text-tertiary); }
        .btn {
            padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px;
            background: var(--bg-tertiary); color: var(--text-primary); font-size: 12px;
            cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 4px;
        }
        .btn:hover { background: var(--bg-secondary); border-color: var(--accent); }
        .btn.active { background: var(--accent); border-color: var(--accent); color: #000; }
        .btn-sm { padding: 4px 10px; font-size: 11px; }
        .auto-refresh-label { font-size: 11px; color: var(--text-tertiary); display: flex; align-items: center; gap: 4px; }
        .toggle-switch {
            position: relative; width: 32px; height: 18px; cursor: pointer;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute; inset: 0; background: var(--bg-tertiary);
            border-radius: 9px; transition: 0.2s;
        }
        .toggle-slider::before {
            content: ''; position: absolute; width: 14px; height: 14px;
            left: 2px; top: 2px; background: var(--text-tertiary);
            border-radius: 50%; transition: 0.2s;
        }
        .toggle-switch input:checked + .toggle-slider { background: var(--accent); }
        .toggle-switch input:checked + .toggle-slider::before { transform: translateX(14px); background: #000; }

        /* 连接列表 */
        .conn-list {
            flex: 1; overflow-y: auto; padding: 0 12px 12px;
        }
        .conn-group {
            margin-bottom: 8px;
        }
        .conn-group-header {
            font-size: 11px; font-weight: 600; color: var(--text-secondary);
            padding: 4px 8px; background: var(--bg-secondary); border-radius: 6px;
            margin-bottom: 4px; display: flex; align-items: center; gap: 6px;
            position: sticky; top: 0; z-index: 10;
        }
        .conn-group-count { font-size: 10px; color: var(--text-tertiary); }
        .conn-item {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 10px; border-radius: 6px; font-size: 12px;
            transition: background 0.1s;
        }
        .conn-item:hover { background: var(--bg-secondary); }
        .conn-process {
            min-width: 80px; max-width: 120px; font-weight: 500;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .conn-addr { flex: 1; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: 'Consolas', 'Monaco', monospace; font-size: 11px; }
        .conn-host { color: var(--text-tertiary); font-size: 10px; }
        .conn-badge {
            font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600; white-space: nowrap;
        }
        .badge-ipv4-direct { background: rgba(59,130,246,0.15); color: var(--ipv4-direct); }
        .badge-ipv6-direct { background: rgba(34,197,94,0.15); color: var(--ipv6-direct); }
        .badge-ipv4-warp { background: rgba(245,158,11,0.15); color: var(--ipv4-warp); }
        .badge-ipv6-warp { background: rgba(239,68,68,0.15); color: var(--ipv6-warp); }

        /* 空状态 */
        .empty-hint { text-align: center; color: var(--text-tertiary); font-size: 12px; padding: 40px 20px; }

        /* 加载状态 */
        .loading-bar {
            height: 2px; background: var(--bg-tertiary); overflow: hidden; display: none;
        }
        .loading-bar.active { display: block; }
        .loading-bar::after {
            content: ''; display: block; width: 30%; height: 100%; background: var(--accent);
            animation: loading-slide 1s ease-in-out infinite;
        }
        @keyframes loading-slide { 0% { margin-left: -30%; } 100% { margin-left: 100%; } }

        /* Toast */
        .toast {
            position: fixed; bottom: 16px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--bg-tertiary); color: var(--text-primary);
            padding: 8px 16px; border-radius: 8px; font-size: 12px;
            border: 1px solid var(--border); transition: transform 0.3s; z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

        /* 图例 */
        .legend {
            display: flex; gap: 10px; padding: 0 12px 6px; flex-wrap: wrap;
        }
        .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-tertiary); }
        .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题栏 -->
        <div class="title-bar pywebview-drag-region">
            <span class="title-bar-text">网络流量监控</span>
            <div class="title-bar-btns">
                <button class="title-bar-btn close" onclick="closeWindow()" title="关闭">
                    <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
        </div>

        <!-- 加载条 -->
        <div class="loading-bar" id="loadingBar"></div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card ipv4-direct">
                <div class="stat-icon">🌐</div>
                <div class="stat-count" id="countIpv4Direct">0</div>
                <div class="stat-label">IPv4 直连</div>
            </div>
            <div class="stat-card ipv6-direct">
                <div class="stat-icon">🟢</div>
                <div class="stat-count" id="countIpv6Direct">0</div>
                <div class="stat-label">IPv6 直连</div>
            </div>
            <div class="stat-card ipv4-warp">
                <div class="stat-icon">🟠</div>
                <div class="stat-count" id="countIpv4Warp">0</div>
                <div class="stat-label">IPv4 + WARP</div>
            </div>
            <div class="stat-card ipv6-warp">
                <div class="stat-icon">🔴</div>
                <div class="stat-count" id="countIpv6Warp">0</div>
                <div class="stat-label">IPv6 + WARP</div>
            </div>
        </div>

        <!-- 图例 -->
        <div class="legend">
            <div class="legend-item"><span class="legend-dot" style="background:var(--ipv4-direct)"></span>校园网 IPv4</div>
            <div class="legend-item"><span class="legend-dot" style="background:var(--ipv6-direct)"></span>校园网 IPv6</div>
            <div class="legend-item"><span class="legend-dot" style="background:var(--ipv4-warp)"></span>WARP 隧道 IPv4</div>
            <div class="legend-item"><span class="legend-dot" style="background:var(--ipv6-warp)"></span>WARP 隧道 IPv6</div>
        </div>

        <!-- 工具栏 -->
        <div class="toolbar">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索进程名或 IP..." oninput="renderConnections()">
            <label class="auto-refresh-label">
                <span class="toggle-switch">
                    <input type="checkbox" id="autoRefreshToggle" checked onchange="toggleAutoRefresh()">
                    <span class="toggle-slider"></span>
                </span>
                自动刷新
            </label>
            <button class="btn btn-sm" onclick="refresh()" id="refreshBtn">刷新</button>
        </div>

        <!-- 连接列表 -->
        <div class="conn-list" id="connList">
            <div class="empty-hint">正在获取网络连接...</div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        let api = window.pywebview ? window.pywebview.api : null;
        let lastData = null;
        let autoRefreshTimer = null;

        function waitForApi() {
            return new Promise((resolve) => {
                if (api) { resolve(); return; }
                const check = setInterval(() => {
                    if (window.pywebview && window.pywebview.api) {
                        api = window.pywebview.api;
                        clearInterval(check);
                        resolve();
                    }
                }, 100);
            });
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show';
            setTimeout(() => { t.className = 'toast'; }, 2000);
        }

        function closeWindow() {
            if (api && api.close_traffic_window) api.close_traffic_window();
        }

        // 走向标签配置
        const ROUTE_LABELS = {
            'ipv4_direct': { text: 'IPv4 直连', class: 'badge-ipv4-direct' },
            'ipv6_direct': { text: 'IPv6 直连', class: 'badge-ipv6-direct' },
            'ipv4_warp':   { text: 'IPv4+WARP', class: 'badge-ipv4-warp' },
            'ipv6_warp':   { text: 'IPv6+WARP', class: 'badge-ipv6-warp' },
        };

        async function refresh() {
            const btn = document.getElementById('refreshBtn');
            const bar = document.getElementById('loadingBar');
            btn.disabled = true;
            bar.classList.add('active');
            try {
                const data = await api.get_traffic_status();
                lastData = data;
                renderStats(data.stats);
                renderConnections();
            } catch (e) {
                showToast('获取失败: ' + e);
            }
            btn.disabled = false;
            bar.classList.remove('active');
        }

        function renderStats(stats) {
            document.getElementById('countIpv4Direct').textContent = stats.ipv4_direct || 0;
            document.getElementById('countIpv6Direct').textContent = stats.ipv6_direct || 0;
            document.getElementById('countIpv4Warp').textContent = stats.ipv4_warp || 0;
            document.getElementById('countIpv6Warp').textContent = stats.ipv6_warp || 0;
        }

        function renderConnections() {
            const container = document.getElementById('connList');
            if (!lastData || !lastData.connections || !lastData.connections.length) {
                container.innerHTML = '<div class="empty-hint">暂无活动 TCP 连接</div>';
                return;
            }

            const keyword = (document.getElementById('searchInput').value || '').trim().toLowerCase();
            let conns = lastData.connections;
            if (keyword) {
                conns = conns.filter(c =>
                    (c.process || '').toLowerCase().includes(keyword) ||
                    (c.remote_ip || '').toLowerCase().includes(keyword) ||
                    (c.hostname || '').toLowerCase().includes(keyword)
                );
            }

            if (!conns.length) {
                container.innerHTML = '<div class="empty-hint">无匹配的连接</div>';
                return;
            }

            // 按进程名分组
            const groups = {};
            conns.forEach(c => {
                const key = c.process || 'unknown';
                if (!groups[key]) groups[key] = [];
                groups[key].push(c);
            });

            let html = '';
            const sortedGroups = Object.keys(groups).sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
            for (const procName of sortedGroups) {
                const groupConns = groups[procName];
                html += `<div class="conn-group">`;
                html += `<div class="conn-group-header">${escapeHtml(procName)} <span class="conn-group-count">${groupConns.length}</span></div>`;
                for (const c of groupConns) {
                    const label = ROUTE_LABELS[c.route_type] || ROUTE_LABELS['ipv4_direct'];
                    const host = c.hostname ? `<span class="conn-host"> (${escapeHtml(c.hostname)})</span>` : '';
                    html += `<div class="conn-item">
                        <span class="conn-process">${escapeHtml(c.process)}</span>
                        <span class="conn-addr">${escapeHtml(c.remote_ip)}:${c.remote_port}${host}</span>
                        <span class="conn-badge ${label.class}">${label.text}</span>
                    </div>`;
                }
                html += `</div>`;
            }
            container.innerHTML = html;
        }

        function escapeHtml(s) {
            if (!s) return '';
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function toggleAutoRefresh() {
            const enabled = document.getElementById('autoRefreshToggle').checked;
            if (enabled) {
                startAutoRefresh();
            } else {
                stopAutoRefresh();
            }
        }

        function startAutoRefresh() {
            stopAutoRefresh();
            autoRefreshTimer = setInterval(refresh, 3000);
        }

        function stopAutoRefresh() {
            if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
        }

        async function init() {
            await waitForApi();
            await refresh();
            startAutoRefresh();
        }

        window.addEventListener('pywebviewready', init);
        setTimeout(() => { if (api) init(); }, 500);
    </script>
</body>
</html>
