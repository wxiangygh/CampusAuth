<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流量可视化</title>
    <style>
        :root {
            --bg-primary: #0D0D0D;
            --bg-secondary: #1A1A1A;
            --bg-tertiary: #262626;
            --accent: #F68320;
            --text-primary: #FFFFFF;
            --text-secondary: #A3A3A3;
            --text-tertiary: #737373;
            --border: rgba(255,255,255,0.08);
            /* 6 种分类颜色 */
            --c-ipv4: #3b82f6;
            --c-ipv6: #22C55E;
            --c-ipv4-warp: #F59E0B;
            --c-ipv4-warp-ipv6: #EAB308;
            --c-ipv6-warp: #EF4444;
            --c-ipv6-warp-ipv4: #A855F7;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            width: 100vw; height: 100vh;
            user-select: none;
        }
        .container { width: 100%; height: 100%; display: flex; flex-direction: column; }

        /* 标题栏 */
        .title-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 16px; background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            -webkit-app-region: drag;
        }
        .title-bar-text { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
        .title-bar-info { font-size: 10px; color: var(--text-tertiary); margin-left: 8px; }
        .title-bar-btns { display: flex; gap: 6px; -webkit-app-region: no-drag; }
        .title-bar-btn {
            width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
            border: none; background: transparent; border-radius: 4px; cursor: pointer;
            color: var(--text-tertiary); transition: all 0.15s; padding: 0;
        }
        .title-bar-btn:hover { background: var(--bg-tertiary); color: var(--text-secondary); }
        .title-bar-btn.close:hover { background: rgba(239,68,68,0.2); color: var(--c-ipv6-warp); }
        .title-bar-btn svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

        /* Canvas 区域 */
        .canvas-wrap { flex: 1; position: relative; overflow: hidden; }
        #flowCanvas { display: block; width: 100%; height: 100%; }

        /* 顶部统计条 */
        .top-stats {
            position: absolute; top: 10px; left: 10px; right: 10px;
            display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
            pointer-events: none;
        }
        .stat-pill {
            display: flex; align-items: center; gap: 5px;
            padding: 4px 10px; border-radius: 16px;
            background: rgba(26,26,26,0.85); backdrop-filter: blur(8px);
            border: 1px solid var(--border); font-size: 11px;
        }
        .stat-dot { width: 7px; height: 7px; border-radius: 50%; }
        .stat-num { font-weight: 700; font-size: 13px; }
        .stat-label { color: var(--text-tertiary); font-size: 9px; }

        /* 底部连接列表 */
        .bottom-panel {
            height: 300px; background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            display: flex; flex-direction: column;
        }
        .panel-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 12px; border-bottom: 1px solid var(--border);
        }
        .panel-header-left { display: flex; align-items: center; gap: 8px; }
        .panel-title { font-size: 11px; font-weight: 600; color: var(--text-secondary); }
        .panel-controls { display: flex; align-items: center; gap: 8px; }
        .search-box {
            width: 130px; padding: 3px 8px; font-size: 11px;
            background: var(--bg-tertiary); border: 1px solid var(--border);
            border-radius: 4px; color: var(--text-primary); outline: none;
        }
        .search-box:focus { border-color: var(--accent); }
        .search-box::placeholder { color: var(--text-tertiary); }
        .auto-toggle { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-tertiary); }
        .toggle-switch { position: relative; width: 28px; height: 16px; cursor: pointer; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; inset: 0; background: var(--bg-tertiary); border-radius: 8px; transition: 0.2s; }
        .toggle-slider::before {
            content: ''; position: absolute; width: 12px; height: 12px;
            left: 2px; top: 2px; background: var(--text-tertiary);
            border-radius: 50%; transition: 0.2s;
        }
        .toggle-switch input:checked + .toggle-slider { background: var(--accent); }
        .toggle-switch input:checked + .toggle-slider::before { transform: translateX(12px); background: #000; }

        /* 操作栏（选中连接时显示） */
        .action-bar {
            display: none; align-items: center; gap: 6px;
            padding: 5px 12px; background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
        }
        .action-bar.show { display: flex; }
        .action-bar .selected-count { font-size: 11px; color: var(--text-secondary); margin-right: 4px; }
        .btn-action {
            padding: 3px 10px; font-size: 10px; font-weight: 500;
            border: 1px solid var(--border); border-radius: 4px;
            background: var(--bg-secondary); color: var(--text-primary);
            cursor: pointer; transition: all 0.15s;
        }
        .btn-action:hover { border-color: var(--accent); color: var(--accent); }
        .btn-action.warp { border-color: rgba(168,85,247,0.4); }
        .btn-action.warp:hover { color: #c084fc; border-color: #c084fc; }
        .btn-action.cancel { border-color: rgba(239,68,68,0.4); color: var(--text-tertiary); }
        .btn-action.cancel:hover { color: var(--c-ipv6-warp); border-color: var(--c-ipv6-warp); }

        /* 复选框 */
        .conn-check {
            width: 13px; height: 13px; accent-color: var(--accent);
            cursor: pointer; flex-shrink: 0;
        }

        /* 进程分组 */
        .proc-group { margin-bottom: 2px; }
        .proc-group-header {
            display: flex; align-items: center; gap: 6px;
            padding: 4px 8px; background: rgba(38,38,38,0.6);
            border-radius: 4px; cursor: pointer;
        }
        .proc-group-header:hover { background: var(--bg-tertiary); }
        .proc-group-header .collapse-icon {
            width: 10px; height: 10px; color: var(--text-tertiary);
            transition: transform 0.2s; flex-shrink: 0;
        }
        .proc-group.collapsed .collapse-icon { transform: rotate(-90deg); }
        .proc-group.collapsed .proc-group-body { display: none; }
        .proc-name { font-weight: 600; font-size: 11px; color: var(--text-primary); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .proc-count { font-size: 9px; color: var(--text-tertiary); background: var(--bg-primary); padding: 1px 6px; border-radius: 8px; }

        .conn-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
        .conn-row {
            display: flex; align-items: center; gap: 8px;
            padding: 3px 8px 3px 28px; border-radius: 4px; font-size: 11px;
            transition: background 0.1s;
        }
        .conn-row:hover { background: var(--bg-tertiary); }
        .conn-row.selected { background: rgba(246,131,32,0.1); }
        .conn-proc { min-width: 70px; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
        .conn-host { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 1px; min-width: 0; }
        .conn-hostname { font-size: 11px; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .conn-ip { color: var(--text-tertiary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: 'Consolas','Monaco',monospace; font-size: 9px; }
        .conn-badge { font-size: 9px; padding: 1px 6px; border-radius: 3px; font-weight: 600; white-space: nowrap; }

        .empty-hint { text-align: center; color: var(--text-tertiary); font-size: 11px; padding: 20px; }

        /* Toast：默认用 opacity+visibility 彻底隐藏，避免空 toast 残留显示 */
        .toast {
            position: fixed; bottom: 190px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            opacity: 0; visibility: hidden;
            background: var(--bg-tertiary); color: var(--text-primary);
            padding: 8px 16px; border-radius: 8px; font-size: 12px;
            border: 1px solid var(--border);
            transition: transform 0.3s, opacity 0.3s, visibility 0.3s; z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; visibility: visible; }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

        /* badge 颜色 */
        .badge-ipv4 { background: rgba(59,130,246,0.15); color: var(--c-ipv4); }
        .badge-ipv6 { background: rgba(34,197,94,0.15); color: var(--c-ipv6); }
        .badge-ipv4-warp { background: rgba(245,158,11,0.15); color: var(--c-ipv4-warp); }
        .badge-ipv4-warp-ipv6 { background: rgba(234,179,8,0.15); color: var(--c-ipv4-warp-ipv6); }
        .badge-ipv6-warp { background: rgba(239,68,68,0.15); color: var(--c-ipv6-warp); }
        .badge-ipv6-warp-ipv4 { background: rgba(168,85,247,0.15); color: var(--c-ipv6-warp-ipv4); }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题栏 -->
        <div class="title-bar pywebview-drag-region">
            <div>
                <span class="title-bar-text">网络流量可视化</span>
                <span class="title-bar-info" id="warpInfo"></span>
            </div>
            <div class="title-bar-btns">
                <button class="title-bar-btn close" onclick="closeWindow()" title="关闭">
                    <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
        </div>

        <!-- Canvas 可视化区 -->
        <div class="canvas-wrap">
            <canvas id="flowCanvas"></canvas>
            <!-- 顶部统计 -->
            <div class="top-stats" id="topStats"></div>
        </div>

        <!-- 底部连接列表 -->
        <div class="bottom-panel">
            <div class="panel-header">
                <div class="panel-header-left">
                    <input type="checkbox" class="conn-check" id="selectAll" onchange="toggleSelectAll(this.checked)" title="全选">
                    <span class="panel-title">活动连接</span>
                </div>
                <div class="panel-controls">
                    <input type="text" class="search-box" id="searchInput" placeholder="搜索域名/IP/进程..." oninput="renderConnList()">
                    <label class="auto-toggle">
                        <span class="toggle-switch">
                            <input type="checkbox" id="cumulativeToggle" onchange="toggleCumulative()">
                            <span class="toggle-slider"></span>
                        </span>
                        累计展示
                    </label>
                    <label class="auto-toggle">
                        <span class="toggle-switch">
                            <input type="checkbox" id="autoToggle" checked onchange="toggleAuto()">
                            <span class="toggle-slider"></span>
                        </span>
                        自动刷新
                    </label>
                </div>
            </div>
            <!-- 操作栏（选中连接时显示） -->
            <div class="action-bar" id="actionBar">
                <span class="selected-count" id="selectedCount">已选 0 项</span>
                <button class="btn-action" onclick="setRoute('ipv4')">IPv4 直连</button>
                <button class="btn-action" onclick="setRoute('ipv6')">IPv6 直连</button>
                <button class="btn-action warp" onclick="setRoute('warp')">不直连(WARP)</button>
                <button class="btn-action cancel" onclick="clearSelection()">取消选择</button>
            </div>
            <div class="conn-list" id="connList">
                <div class="empty-hint">加载中...</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let api = null;
        let lastData = null;
        let autoTimer = null;
        let canvas, ctx;
        let particles = [];
        let animFrame = null;
        let _initStarted = false;
        // 选中连接的 ID 集合 + 连接数据映射（用于多选和批量操作）
        let selectedConns = new Set();
        let connMap = new Map();
        // 折叠的进程组集合（持久化，刷新后保持折叠状态）
        let collapsedGroups = new Set();
        // 累计展示模式：保存历史连接（key=连接唯一标识，value=最新连接数据）
        let cumulativeMode = false;
        let cumulativeConns = new Map();
        // 6 种分类的统计和配置
        let stats = { ipv4: 0, ipv6: 0, ipv4_warp: 0, ipv4_warp_ipv6: 0, ipv6_warp: 0, ipv6_warp_ipv4: 0 };
        let warpUnderlay = 'ipv4';

        // 6 种分类配置（颜色、标签）
        // 标签格式：WARP[v4]→v4 表示 WARP 底层为 IPv4，内部传输 IPv4
        const ROUTE_CONFIG = {
            'ipv4':            { color: '#3b82f6', label: 'IPv4 直连',   badge: 'badge-ipv4',            isWarp: false },
            'ipv6':            { color: '#22C55E', label: 'IPv6 直连',   badge: 'badge-ipv6',            isWarp: false },
            'ipv4_warp':       { color: '#F59E0B', label: 'WARP[v4]→v4', badge: 'badge-ipv4-warp',       isWarp: true },
            'ipv4_warp_ipv6':  { color: '#EAB308', label: 'WARP[v4]→v6', badge: 'badge-ipv4-warp-ipv6',  isWarp: true },
            'ipv6_warp':       { color: '#EF4444', label: 'WARP[v6]→v6', badge: 'badge-ipv6-warp',       isWarp: true },
            'ipv6_warp_ipv4':  { color: '#A855F7', label: 'WARP[v6]→v4', badge: 'badge-ipv6-warp-ipv4',  isWarp: true },
        };

        // 节点定义（坐标在 resize 时计算）
        let nodes = {};

        function waitForApi(timeoutMs) {
            timeoutMs = timeoutMs || 10000;
            return new Promise((resolve, reject) => {
                if (window.pywebview && window.pywebview.api) {
                    api = window.pywebview.api; resolve(); return;
                }
                const start = Date.now();
                const check = setInterval(() => {
                    if (window.pywebview && window.pywebview.api) {
                        api = window.pywebview.api; clearInterval(check); resolve();
                    } else if (Date.now() - start > timeoutMs) {
                        clearInterval(check); reject(new Error('API 等待超时'));
                    }
                }, 100);
            });
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = 'toast show';
            setTimeout(() => { t.className = 'toast'; }, 2000);
        }

        function closeWindow() {
            if (api && api.close_flow_window) api.close_flow_window();
        }

        // ===================== Canvas 可视化 =====================

        function initCanvas() {
            canvas = document.getElementById('flowCanvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            startAnimation();
        }

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            ctx.scale(dpr, dpr);
            computeNodes(rect.width, rect.height);
            buildGridCanvas(rect.width, rect.height);  // 重建网格预渲染
        }

        function computeNodes(w, h) {
            // 布局说明：
            // - 本机：左侧
            // - WARP 隧道矩形：中间，内部包含 4 个 WARP 计数节点（圆形，被隧道处理）
            // - 直连计数节点（2 个）：靠近隧道矩形外侧（右上/右下角外），体现"经过隧道但不被处理"
            // - 类型节点（6 个）：最右侧竖直排列，端口形状，隧道矩形外
            const cx = w * 0.08;
            const cy = h * 0.5;
            const tunnelX = w * 0.35;        // 隧道中心 X
            const tunnelW = 90;              // 隧道宽度
            const tunnelH = 230;             // 隧道高度（容纳 4 个 WARP 计数节点）
            const tunnelRight = tunnelX + tunnelW / 2;  // 隧道右边缘
            const tunnelTop = cy - tunnelH / 2;         // 隧道顶边
            const tunnelBottom = cy + tunnelH / 2;      // 隧道底边
            const typeX = w * 0.82;          // 类型节点 X（最右侧）

            // 类型节点：6 个竖直排列，居中
            const typeSpacing = Math.min(h * 0.12, 55);
            const typeStartY = cy - typeSpacing * 2.5;  // 6 个节点居中

            // 直连计数节点：靠近隧道右上/右下角外侧，体现"经过隧道但不进入"
            const directOffset = 18;  // 距离隧道角的外偏移量

            // WARP 计数节点：4 个，在隧道矩形内部均匀分布
            const warpCountSpacing = (tunnelH - 50) / 3;
            const warpCountStartY = cy - warpCountSpacing * 1.5;

            nodes = {
                local: { x: cx, y: cy, label: '本机', color: '#A3A3A3' },
                tunnel: { x: tunnelX, y: cy, w: tunnelW, h: tunnelH, label: 'WARP 隧道', color: '#F68320' },

                // === 类型节点（端口形状，最右侧竖直排列，隧道外）===
                type_ipv4:            { x: typeX, y: typeStartY,                  label: 'IPv4 直连',    color: '#3b82f6', isType: true, routeType: 'ipv4' },
                type_ipv6:            { x: typeX, y: typeStartY + typeSpacing,    label: 'IPv6 直连',    color: '#22C55E', isType: true, routeType: 'ipv6' },
                type_ipv4_warp:       { x: typeX, y: typeStartY + typeSpacing * 2, label: 'WARP[v4]→v4', color: '#F59E0B', isType: true, routeType: 'ipv4_warp' },
                type_ipv4_warp_ipv6:  { x: typeX, y: typeStartY + typeSpacing * 3, label: 'WARP[v4]→v6', color: '#EAB308', isType: true, routeType: 'ipv4_warp_ipv6' },
                type_ipv6_warp:       { x: typeX, y: typeStartY + typeSpacing * 4, label: 'WARP[v6]→v6', color: '#EF4444', isType: true, routeType: 'ipv6_warp' },
                type_ipv6_warp_ipv4:  { x: typeX, y: typeStartY + typeSpacing * 5, label: 'WARP[v6]→v4', color: '#A855F7', isType: true, routeType: 'ipv6_warp_ipv4' },

                // === 直连计数节点（圆形，靠近隧道右上/右下角外侧，体现"经过但不进入"）===
                count_ipv4: { x: tunnelRight + directOffset, y: tunnelTop - directOffset,    color: '#3b82f6', isCount: true, routeType: 'ipv4' },
                count_ipv6: { x: tunnelRight + directOffset, y: tunnelBottom + directOffset, color: '#22C55E', isCount: true, routeType: 'ipv6' },

                // === WARP 计数节点（圆形，隧道矩形内部，体现"被隧道处理"）===
                count_ipv4_warp:       { x: tunnelX, y: warpCountStartY,                  color: '#F59E0B', isCount: true, inTunnel: true, routeType: 'ipv4_warp' },
                count_ipv4_warp_ipv6:  { x: tunnelX, y: warpCountStartY + warpCountSpacing, color: '#EAB308', isCount: true, inTunnel: true, routeType: 'ipv4_warp_ipv6' },
                count_ipv6_warp:       { x: tunnelX, y: warpCountStartY + warpCountSpacing * 2, color: '#EF4444', isCount: true, inTunnel: true, routeType: 'ipv6_warp' },
                count_ipv6_warp_ipv4:  { x: tunnelX, y: warpCountStartY + warpCountSpacing * 3, color: '#A855F7', isCount: true, inTunnel: true, routeType: 'ipv6_warp_ipv4' },
            };
        }

        // 路径：本机 → 计数节点 → 类型节点（多段直线，计数节点在连线上）
        function getPathPoints(routeType) {
            const local = nodes.local;
            const countNode = nodes['count_' + routeType];
            const typeNode = nodes['type_' + routeType];
            if (!countNode || !typeNode) return null;
            return [
                { x: local.x, y: local.y },
                { x: countNode.x, y: countNode.y },
                { x: typeNode.x, y: typeNode.y },
            ];
        }

        // 多段直线上某点的坐标（t ∈ [0, 1]，均匀分布在整条折线上）
        function pathPoint(points, t) {
            if (points.length < 2) return points[0];
            // 计算各段长度，按弧长均匀分布
            const segs = [];
            let totalLen = 0;
            for (let i = 0; i < points.length - 1; i++) {
                const dx = points[i + 1].x - points[i].x;
                const dy = points[i + 1].y - points[i].y;
                const len = Math.sqrt(dx * dx + dy * dy);
                segs.push(len);
                totalLen += len;
            }
            const target = t * totalLen;
            let acc = 0;
            for (let i = 0; i < segs.length; i++) {
                if (acc + segs[i] >= target) {
                    const localT = segs[i] > 0 ? (target - acc) / segs[i] : 0;
                    return {
                        x: (1 - localT) * points[i].x + localT * points[i + 1].x,
                        y: (1 - localT) * points[i].y + localT * points[i + 1].y,
                    };
                }
                acc += segs[i];
            }
            return points[points.length - 1];
        }

        // 绘制 WARP 隧道矩形容器（虚线边框，内部容纳 WARP 计数节点）
        function drawTunnel(node) {
            const x = node.x - node.w / 2;
            const y = node.y - node.h / 2;
            ctx.fillStyle = 'rgba(246,131,32,0.06)';
            roundRect(ctx, x, y, node.w, node.h, 12);
            ctx.fill();
            ctx.strokeStyle = node.color;
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 3]);  // 虚线边框，表示容器
            roundRect(ctx, x, y, node.w, node.h, 12);
            ctx.stroke();
            ctx.setLineDash([]);  // 恢复实线
            // 隧道标题在矩形顶部外侧
            ctx.fillStyle = node.color;
            ctx.font = '600 10px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(node.label, node.x, y - 10);
            // WARP 底层类型标注
            ctx.fillStyle = '#A3A3A3';
            ctx.font = '500 8px sans-serif';
            ctx.fillText(warpUnderlay === 'ipv6' ? '(IPv6)' : '(IPv4)', node.x, y - 22);
        }

        // 绘制类型节点（端口形状，标签在左侧）
        function drawPortNode(node) {
            const w = 44, h = 30;
            const x = node.x - w / 2;
            const y = node.y - h / 2;
            // 端口外框（圆角矩形）
            ctx.fillStyle = node.color + '22';
            roundRect(ctx, x, y, w, h, 5);
            ctx.fill();
            ctx.strokeStyle = node.color;
            ctx.lineWidth = 1.5;
            roundRect(ctx, x, y, w, h, 5);
            ctx.stroke();
            // 端口插槽（内部梯形凹陷，模拟 RJ45 网口）
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.beginPath();
            ctx.moveTo(x + 8, y + 7);
            ctx.lineTo(x + w - 8, y + 7);
            ctx.lineTo(x + w - 11, y + h - 7);
            ctx.lineTo(x + 11, y + h - 7);
            ctx.closePath();
            ctx.fill();
            // 端口针脚
            ctx.strokeStyle = node.color;
            ctx.lineWidth = 1;
            const pinCount = 4;
            const pinStart = x + 13;
            const pinEnd = x + w - 13;
            const pinSpacing = (pinEnd - pinStart) / (pinCount - 1);
            for (let i = 0; i < pinCount; i++) {
                const px = pinStart + i * pinSpacing;
                ctx.beginPath();
                ctx.moveTo(px, y + 10);
                ctx.lineTo(px, y + h - 10);
                ctx.stroke();
            }
            // 标签在端口左侧（节点在最右侧，标签向左延伸）
            ctx.fillStyle = node.color;
            ctx.font = '600 9px sans-serif';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            ctx.fillText(node.label, x - 6, node.y);
        }

        // 绘制计数节点（圆形，内部只显示计数数字，与对应类型节点同色）
        function drawCountNode(node) {
            const count = stats[node.routeType] || 0;
            const r = count > 0 ? 14 : 10;
            ctx.fillStyle = node.color + (count > 0 ? '44' : '15');
            ctx.beginPath();
            ctx.arc(node.x, node.y, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = node.color;
            ctx.lineWidth = count > 0 ? 1.5 : 1;
            ctx.beginPath();
            ctx.arc(node.x, node.y, r, 0, Math.PI * 2);
            ctx.stroke();
            // 只显示计数，无其他内容
            if (count > 0) {
                ctx.fillStyle = node.color;
                ctx.font = '700 11px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(count.toString(), node.x, node.y);
            }
        }

        function drawLocalNode() {
            const n = nodes.local;
            // 本机节点用低频脉冲（每秒一次），降低 GPU 负担
            const pulse = Math.sin(Date.now() / 1000) * 0.3 + 0.7;
            ctx.fillStyle = 'rgba(246,131,32,0.12)';
            ctx.beginPath();
            ctx.arc(n.x, n.y, 26, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'rgba(246,131,32,0.25)';
            ctx.beginPath();
            ctx.arc(n.x, n.y, 18, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#F68320';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(n.x, n.y, 18, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = '#FFFFFF';
            ctx.font = '700 10px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(n.label, n.x, n.y);
            // 总连接数
            const total = stats.ipv4 + stats.ipv6 + stats.ipv4_warp + stats.ipv4_warp_ipv6 + stats.ipv6_warp + stats.ipv6_warp_ipv4;
            ctx.fillStyle = '#A3A3A3';
            ctx.font = '500 8px sans-serif';
            ctx.fillText(total + ' 连接', n.x, n.y + 32);
        }

        function drawPath(routeType) {
            const points = getPathPoints(routeType);
            if (!points) return;
            const color = ROUTE_CONFIG[routeType].color;
            const count = stats[routeType] || 0;

            ctx.strokeStyle = count > 0 ? color + '55' : color + '15';
            ctx.lineWidth = count > 0 ? 2 : 1;
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            // 多段直线，确保计数节点在连线上
            for (let i = 1; i < points.length; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }
            ctx.stroke();
            // 计数已由计数节点显示，路径上不再重复标注
        }

        function drawParticles() {
            for (const rt of Object.keys(ROUTE_CONFIG)) {
                const count = stats[rt] || 0;
                if (count === 0) continue;
                const points = getPathPoints(rt);
                if (!points) continue;
                const color = ROUTE_CONFIG[rt].color;
                const particleCount = Math.min(count, 4);  // 减少粒子数量上限
                const speed = 0.002 + count * 0.0003;

                for (let i = 0; i < particleCount; i++) {
                    let t = (Date.now() * speed + i / particleCount) % 1;
                    const pos = pathPoint(points, t);
                    const trailLen = 3;  // 减少拖尾长度
                    for (let j = 0; j < trailLen; j++) {
                        const tt = Math.max(0, t - j * 0.025);
                        const tp = pathPoint(points, tt);
                        const alpha = (1 - j / trailLen) * 0.5;
                        ctx.fillStyle = color + Math.floor(alpha * 255).toString(16).padStart(2, '0');
                        ctx.beginPath();
                        ctx.arc(tp.x, tp.y, 2 - j * 0.4, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        // 网格离屏 canvas（静态背景，预渲染避免每帧重绘）
        let gridCanvas = null;

        function buildGridCanvas(w, h) {
            gridCanvas = document.createElement('canvas');
            const dpr = window.devicePixelRatio || 1;
            gridCanvas.width = w * dpr;
            gridCanvas.height = h * dpr;
            const gctx = gridCanvas.getContext('2d');
            gctx.scale(dpr, dpr);
            gctx.strokeStyle = 'rgba(255,255,255,0.02)';
            gctx.lineWidth = 1;
            for (let x = 0; x < w; x += 40) {
                gctx.beginPath(); gctx.moveTo(x, 0); gctx.lineTo(x, h); gctx.stroke();
            }
            for (let y = 0; y < h; y += 40) {
                gctx.beginPath(); gctx.moveTo(0, y); gctx.lineTo(w, y); gctx.stroke();
            }
        }

        function drawScene() {
            const rect = canvas.parentElement.getBoundingClientRect();
            ctx.clearRect(0, 0, rect.width, rect.height);

            // 背景网格（使用预渲染的离屏 canvas）
            if (gridCanvas) {
                ctx.drawImage(gridCanvas, 0, 0, rect.width, rect.height);
            }

            // 绘制路径（先画路径再画节点）
            for (const rt of Object.keys(ROUTE_CONFIG)) {
                drawPath(rt);
            }

            // 绘制粒子
            drawParticles();

            // 绘制本机节点
            drawLocalNode();

            // WARP 隧道矩形容器（先画容器，再画内部计数节点）
            drawTunnel(nodes.tunnel);
            // WARP 计数节点（圆形，在隧道矩形内部）
            drawCountNode(nodes.count_ipv4_warp);
            drawCountNode(nodes.count_ipv4_warp_ipv6);
            drawCountNode(nodes.count_ipv6_warp);
            drawCountNode(nodes.count_ipv6_warp_ipv4);

            // 直连计数节点（圆形，在隧道矩形外）
            drawCountNode(nodes.count_ipv4);
            drawCountNode(nodes.count_ipv6);

            // 类型节点（端口形状，最右侧竖直排列，隧道外）
            drawPortNode(nodes.type_ipv4);
            drawPortNode(nodes.type_ipv6);
            drawPortNode(nodes.type_ipv4_warp);
            drawPortNode(nodes.type_ipv4_warp_ipv6);
            drawPortNode(nodes.type_ipv6_warp);
            drawPortNode(nodes.type_ipv6_warp_ipv4);
        }

        function startAnimation() {
            // 限制为约 20fps（每 50ms 一帧），降低 GPU 占用
            // requestAnimationFrame 在后台标签页会自动降频，但前台仍 60fps
            function loop() {
                drawScene();
                animFrame = setTimeout(loop, 50);
            }
            loop();
        }

        function stopAnimation() {
            if (animFrame) { clearTimeout(animFrame); animFrame = null; }
        }

        // ===================== 数据获取 =====================

        let _refreshTimer = null;  // 防抖定时器，避免短时间内多次刷新叠加
        let _loadingFast = false;  // fast 请求加载标志，防止自动刷新堆积
        let _loadingSlow = false;  // slow 请求加载标志，独立于 fast

        async function refreshFast() {
            if (!api || _loadingFast) return;
            _loadingFast = true;
            try {
                const data = await api.get_traffic_status_fast();
                lastData = data;
                stats = data.stats || stats;
                warpUnderlay = data.warp_underlay || 'ipv4';
                // 累计展示模式：将当前连接合并到历史（同 ID 覆盖为最新）
                if (cumulativeMode && data.connections && data.connections.length > 0) {
                    for (const c of data.connections) {
                        cumulativeConns.set(connId(c), c);
                    }
                }
                updateStats();
                renderConnList();
            } catch (e) {
                showToast('获取失败: ' + e);
                const container = document.getElementById('connList');
                if (container && (!lastData || !lastData.connections)) {
                    container.innerHTML = '<div class="empty-hint">获取数据失败，请点击刷新重试</div>';
                }
            } finally {
                _loadingFast = false;
            }
        }

        async function refreshSlow() {
            if (!api || _loadingSlow) return;
            _loadingSlow = true;
            try {
                // 收集当前未命中域名的 IP
                const missingIps = [];
                for (const c of (lastData?.connections || [])) {
                    if (!c.hostname && c.remote_ip) missingIps.push(c.remote_ip);
                }
                if (missingIps.length === 0) return;
                const ipToHost = await api.get_traffic_status_slow(missingIps);
                // 增量更新已渲染连接的域名
                let updated = false;
                for (const c of (lastData?.connections || [])) {
                    if (!c.hostname && ipToHost[c.remote_ip]) {
                        c.hostname = ipToHost[c.remote_ip];
                        updated = true;
                    }
                }
                if (updated) {
                    // 同步更新累计模式中的连接
                    if (cumulativeMode) {
                        for (const c of (lastData?.connections || [])) {
                            if (c.hostname) cumulativeConns.set(connId(c), c);
                        }
                    }
                    renderConnList();
                }
            } catch (e) {
                // slow 失败不影响主流程，域名保持 IP 显示
                console.warn('refreshSlow failed:', e);
            } finally {
                _loadingSlow = false;
            }
        }

        async function refresh() {
            if (!api) return;
            try {
                const data = await api.get_traffic_status();
                lastData = data;
                stats = data.stats || stats;
                warpUnderlay = data.warp_underlay || 'ipv4';
                // 累计展示模式：将当前连接合并到历史（同 ID 覆盖为最新）
                // 注意：如果 WARP 正在重连导致连接列表为空，不覆盖历史记录
                if (cumulativeMode && data.connections && data.connections.length > 0) {
                    for (const c of data.connections) {
                        cumulativeConns.set(connId(c), c);
                    }
                }
                updateStats();
                renderConnList();
            } catch (e) {
                showToast('获取失败: ' + e);
                const container = document.getElementById('connList');
                if (container && (!lastData || !lastData.connections)) {
                    container.innerHTML = '<div class="empty-hint">获取数据失败，请点击刷新重试</div>';
                }
            }
        }

        // 防抖刷新：短时间内多次调用只执行最后一次，避免 setRoute 延迟刷新与自动刷新叠加
        function refreshDebounced(delay) {
            if (_refreshTimer) clearTimeout(_refreshTimer);
            _refreshTimer = setTimeout(() => {
                _refreshTimer = null;
                refresh();
            }, delay);
        }

        function updateStats() {
            // 更新顶部统计条
            const container = document.getElementById('topStats');
            let html = '';
            for (const [key, cfg] of Object.entries(ROUTE_CONFIG)) {
                const count = stats[key] || 0;
                html += `<div class="stat-pill">
                    <span class="stat-dot" style="background:${cfg.color}"></span>
                    <span class="stat-num" style="color:${cfg.color}">${count}</span>
                    <span class="stat-label">${cfg.label}</span>
                </div>`;
            }
            container.innerHTML = html;

            // 更新标题栏 WARP 信息
            const infoEl = document.getElementById('warpInfo');
            if (infoEl) {
                infoEl.textContent = 'WARP 底层: ' + (warpUnderlay === 'ipv6' ? 'IPv6' : 'IPv4');
            }
        }

        // 生成连接唯一 ID
        function connId(c) {
            return `${c.process}|${c.remote_ip}|${c.remote_port}`;
        }

        // 根据用户选择的路由和连接当前 IP 推断修改后的 route_type
        // 用于乐观更新累计模式中的连接类型（与后端 get_traffic_status 的分类逻辑一致）
        function inferRouteType(route, conn) {
            const isIpv6 = ':' in (conn.remote_ip || '') || conn.is_ipv6;
            if (route === 'ipv4') return 'ipv4';       // IPv4 直连
            if (route === 'ipv6') return 'ipv6';       // IPv6 直连
            // route === 'warp'：走 WARP，类型取决于 WARP 底层和连接 IP
            if (warpUnderlay === 'ipv6') {
                return isIpv6 ? 'ipv6_warp' : 'ipv6_warp_ipv4';
            } else {
                return isIpv6 ? 'ipv4_warp_ipv6' : 'ipv4_warp';
            }
        }

        // HTML 属性转义（用于 data-* 属性中的引号）
        function escapeAttr(s) {
            if (!s) return '';
            return s.replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function renderConnList() {
            const container = document.getElementById('connList');
            // 累计展示模式：合并历史连接和当前连接
            let conns;
            if (cumulativeMode) {
                // 累计模式：用历史连接（包含当前最新），不按时间区分
                conns = Array.from(cumulativeConns.values());
            } else {
                if (!lastData || !lastData.connections || !lastData.connections.length) {
                    connMap.clear();
                    container.innerHTML = '<div class="empty-hint">暂无活动连接</div>';
                    updateActionBar();
                    return;
                }
                conns = lastData.connections;
            }

            const kw = (document.getElementById('searchInput').value || '').trim().toLowerCase();
            if (kw) {
                conns = conns.filter(c =>
                    (c.process || '').toLowerCase().includes(kw) ||
                    (c.remote_ip || '').toLowerCase().includes(kw) ||
                    (c.hostname || '').toLowerCase().includes(kw)
                );
            }
            if (!conns.length) {
                container.innerHTML = '<div class="empty-hint">' + (cumulativeMode ? '暂无累计连接' : '无匹配连接') + '</div>';
                updateActionBar();
                return;
            }

            // 更新连接映射，清理已消失的选中项
            connMap.clear();
            for (const c of conns) {
                connMap.set(connId(c), c);
            }
            // 移除不再存在的选中项
            const toRemove = [];
            for (const id of selectedConns) {
                if (!connMap.has(id)) toRemove.push(id);
            }
            for (const id of toRemove) selectedConns.delete(id);

            // 按进程分组
            const groups = {};
            for (const c of conns) {
                const proc = c.process || 'unknown';
                if (!groups[proc]) groups[proc] = [];
                groups[proc].push(c);
            }

            let html = '';
            for (const [proc, items] of Object.entries(groups)) {
                const allSelected = items.every(c => selectedConns.has(connId(c)));
                const someSelected = items.some(c => selectedConns.has(connId(c)));
                const procEsc = escapeAttr(proc);
                const isCollapsed = collapsedGroups.has(proc);
                html += `<div class="proc-group${isCollapsed ? ' collapsed' : ''}">
                    <div class="proc-group-header" onclick="toggleGroupCollapse('${procEsc}')">
                        <svg class="collapse-icon" viewBox="0 0 10 10"><path d="M2 3 L5 7 L8 3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        <input type="checkbox" class="conn-check group-check" ${allSelected ? 'checked' : ''} onclick="event.stopPropagation(); toggleGroup('${procEsc}', this.checked)" ${someSelected && !allSelected ? 'style="opacity:0.5"' : ''}>
                        <span class="proc-name">${escapeHtml(proc)}</span>
                        <span class="proc-count">${items.length}</span>
                    </div>
                    <div class="proc-group-body">`;
                for (const c of items) {
                    const id = connId(c);
                    const cfg = ROUTE_CONFIG[c.route_type] || ROUTE_CONFIG['ipv4'];
                    const hostDisplay = c.hostname ? escapeHtml(c.hostname) : '(无域名)';
                    const checked = selectedConns.has(id) ? 'checked' : '';
                    const selClass = selectedConns.has(id) ? ' selected' : '';
                    const idEsc = escapeAttr(id);
                    html += `<div class="conn-row${selClass}">
                        <input type="checkbox" class="conn-check" ${checked} onclick="event.stopPropagation();" onchange="toggleConn('${idEsc}', this.checked)">
                        <span class="conn-host">
                            <span class="conn-hostname">${hostDisplay}</span>
                            <span class="conn-ip">${escapeHtml(c.remote_ip)}:${c.remote_port}</span>
                        </span>
                        <span class="conn-badge ${cfg.badge}">${cfg.label}</span>
                    </div>`;
                }
                html += '</div></div>';
            }
            container.innerHTML = html;
            updateActionBar();
        }

        // 切换分组折叠状态
        function toggleGroupCollapse(proc) {
            if (collapsedGroups.has(proc)) {
                collapsedGroups.delete(proc);
            } else {
                collapsedGroups.add(proc);
            }
            // 局部更新，避免重渲染
            const header = event.currentTarget;
            const group = header.closest('.proc-group');
            if (group) group.classList.toggle('collapsed');
        }

        // 累计展示模式切换
        function toggleCumulative() {
            cumulativeMode = document.getElementById('cumulativeToggle').checked;
            if (cumulativeMode) {
                // 开启累计：将当前连接加入历史
                if (lastData && lastData.connections) {
                    for (const c of lastData.connections) {
                        cumulativeConns.set(connId(c), c);
                    }
                }
                showToast(`累计展示已开启，当前 ${cumulativeConns.size} 个连接`);
            } else {
                // 关闭累计：清空历史，切回实时
                cumulativeConns.clear();
                showToast('已切换为实时展示');
            }
            renderConnList();
        }

        // 单个连接复选框切换
        function toggleConn(id, checked) {
            if (checked) { selectedConns.add(id); }
            else { selectedConns.delete(id); }
            updateActionBar();
            // 局部更新行样式，避免重渲染
            const row = document.querySelector(`input.conn-check[onchange*="${id}"]`)?.closest('.conn-row');
            if (row) row.classList.toggle('selected', checked);
        }

        // 组内全选/取消（不传 checked 时为切换模式）
        function toggleGroup(proc, checked) {
            const items = Array.from(connMap.values()).filter(c => (c.process || 'unknown') === proc);
            if (checked === undefined) {
                // 切换模式：如果全选了就取消，否则全选
                const allSelected = items.every(c => selectedConns.has(connId(c)));
                checked = !allSelected;
            }
            for (const c of items) {
                if (checked) selectedConns.add(connId(c));
                else selectedConns.delete(connId(c));
            }
            renderConnList();
        }

        // 全选/取消全选
        function toggleSelectAll(checked) {
            if (checked) {
                for (const id of connMap.keys()) selectedConns.add(id);
            } else {
                selectedConns.clear();
            }
            renderConnList();
        }

        // 更新操作栏显示状态
        function updateActionBar() {
            const bar = document.getElementById('actionBar');
            const count = document.getElementById('selectedCount');
            const selectAllCb = document.getElementById('selectAll');
            if (selectedConns.size > 0) {
                bar.classList.add('show');
                count.textContent = `已选 ${selectedConns.size} 项`;
            } else {
                bar.classList.remove('show');
            }
            // 更新全选复选框状态
            if (connMap.size > 0 && selectedConns.size === connMap.size) {
                selectAllCb.checked = true;
                selectAllCb.style.opacity = '1';
            } else if (selectedConns.size > 0) {
                selectAllCb.checked = false;
                selectAllCb.style.opacity = '0.5';
            } else {
                selectAllCb.checked = false;
                selectAllCb.style.opacity = '1';
            }
        }

        // 清除选择
        function clearSelection() {
            selectedConns.clear();
            renderConnList();
        }

        // 批量设置路由类型
        async function setRoute(route) {
            if (selectedConns.size === 0 || !api) return;
            // 收集选中连接的标识信息
            const items = [];
            const connById = {};  // id → 连接对象，用于后续乐观更新
            for (const id of selectedConns) {
                const c = connMap.get(id);
                if (c) {
                    items.push({ hostname: c.hostname || '', remote_ip: c.remote_ip });
                    connById[id] = c;
                }
            }
            if (items.length === 0) return;
            const routeLabel = route === 'warp' ? '不直连(WARP)' : (route === 'ipv6' ? 'IPv6 直连' : 'IPv4 直连');
            showToast(`正在设置 ${items.length} 个连接为 ${routeLabel}...`);
            try {
                const result = await api.set_connections_route(items, route);
                // 解析后端返回的逐条结果，按实际成功/失败更新累计连接类型
                const results = result.results || [];
                let successCount = 0;
                let failCount = 0;
                const failMessages = [];
                for (let i = 0; i < results.length; i++) {
                    const r = results[i];
                    // 通过 hostname+remote_ip 匹配回连接对象
                    const matchedId = Object.keys(connById).find(id => {
                        const c = connById[id];
                        return (c.hostname || '') === r.hostname && c.remote_ip === r.remote_ip;
                    });
                    if (r.success) {
                        successCount++;
                        // 乐观更新：仅对成功的连接更新类型
                        if (matchedId && cumulativeMode) {
                            const c = cumulativeConns.get(matchedId);
                            if (c) {
                                c.route_type = inferRouteType(route, c);
                                c.is_warp = (route === 'warp');
                                cumulativeConns.set(matchedId, c);
                            }
                        }
                    } else {
                        failCount++;
                        failMessages.push(`${r.hostname || r.remote_ip}: ${r.message}`);
                    }
                }
                // 提示实际结果
                if (failCount === 0) {
                    showToast(`${routeLabel}: 全部成功 (${successCount}/${items.length})`);
                } else {
                    showToast(`${routeLabel}: 成功 ${successCount}，失败 ${failCount}。${failMessages.slice(0, 2).join('; ')}`);
                }
                // 立即重新渲染列表（累计模式下能看到类型变化）
                renderConnList();
                // 防抖刷新：延迟获取后端实际数据覆盖乐观更新，避免与自动刷新叠加
                refreshDebounced(1200);
                // 仅当全部成功时清除选择，失败项保留选中以便重试
                if (failCount === 0) {
                    clearSelection();
                }
            } catch (e) {
                showToast('设置失败: ' + e);
            }
        }

        function escapeHtml(s) {
            if (!s) return '';
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function toggleAuto() {
            if (document.getElementById('autoToggle').checked) { startAuto(); } else { stopAuto(); }
        }

        function startAuto() {
            stopAuto();
            autoTimer = setInterval(refreshFast, 3000);
        }

        function stopAuto() {
            if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
        }

        async function init() {
            if (_initStarted) return;
            _initStarted = true;
            try {
                await waitForApi(15000);
            } catch (e) {
                document.getElementById('connList').innerHTML =
                    '<div class="empty-hint">API 加载超时，请关闭窗口重试</div>';
                showToast('API 加载超时: ' + e.message);
                return;
            }
            initCanvas();
            await refreshFast();        // 先拿 fast 数据，立即渲染（域名显示 IP）
            refreshSlow();              // 后台异步（不 await），拿到域名后增量更新
            startAuto();                // 自动刷新改为 fast-only
        }

        window.addEventListener('pywebviewready', init);
        setTimeout(() => { if (window.pywebview && window.pywebview.api && !_initStarted) init(); }, 1000);

        // 窗口隐藏时停止轮询和动画以节省资源，显示时恢复
        let _wasAutoBeforeHide = false;
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // 窗口隐藏：停止动画和轮询
                _wasAutoBeforeHide = !!autoTimer;
                stopAuto();
                stopAnimation();
            } else {
                // 窗口显示：恢复动画，如果之前开启了自动刷新则恢复
                if (!animFrame) startAnimation();
                if (_wasAutoBeforeHide) startAuto();
                refresh();  // 立即刷新一次
            }
        });
    </script>
</body>
</html>
