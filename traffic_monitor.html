<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流量监控</title>
    <style>
        :root {
            --bg-primary: #0D0D0D;
            --bg-secondary: #1A1A1A;
            --bg-tertiary: #262626;
            --accent: #F68320;
            --text-primary: #FFFFFF;
            --text-secondary: #A3A3A3;
            --text-tertiary: #737373;
            --border: rgba(255,255,255,0.08);
            /* 6 种分类颜色 */
            --c-ipv4: #3b82f6;
            --c-ipv6: #22C55E;
            --c-ipv4-warp: #F59E0B;
            --c-ipv4-warp-ipv6: #EAB308;
            --c-ipv6-warp: #EF4444;
            --c-ipv6-warp-ipv4: #A855F7;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            width: 100vw; height: 100vh;
            user-select: none;
        }
        input { user-select: text; -webkit-app-region: no-drag; }
        .container { width: 100%; height: 100%; display: flex; flex-direction: column; }

        /* 标题栏 */
        .title-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 16px; background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            -webkit-app-region: drag;
        }
        .title-bar-text { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
        .title-bar-info { font-size: 10px; color: var(--text-tertiary); margin-left: 8px; }
        .title-bar-btns { display: flex; gap: 6px; -webkit-app-region: no-drag; }
        .title-bar-btn {
            width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
            border: none; background: transparent; border-radius: 4px; cursor: pointer;
            color: var(--text-tertiary); transition: all 0.15s; padding: 0;
        }
        .title-bar-btn:hover { background: var(--bg-tertiary); color: var(--text-secondary); }
        .title-bar-btn.close:hover { background: rgba(239,68,68,0.2); color: var(--c-ipv6-warp); }
        .title-bar-btn svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

        /* 统计卡片 - 6 个 */
        .stats-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
            padding: 10px;
        }
        .stat-card {
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 8px; padding: 8px 6px; text-align: center;
            transition: border-color 0.2s; position: relative;
        }
        .stat-card:hover { border-color: var(--accent); }
        .stat-card .stat-count { font-size: 20px; font-weight: 700; line-height: 1.2; }
        .stat-card .stat-label { font-size: 9px; color: var(--text-tertiary); margin-top: 2px; }
        .stat-card .stat-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 3px; vertical-align: middle; }
        .stat-card.c-ipv4 .stat-count, .stat-card.c-ipv4 .stat-dot { color: var(--c-ipv4); background: var(--c-ipv4); }
        .stat-card.c-ipv4 .stat-dot { background: var(--c-ipv4); }
        .stat-card.c-ipv4 .stat-count { color: var(--c-ipv4); background: transparent; }

        .stat-card.c-ipv6 .stat-count { color: var(--c-ipv6); }
        .stat-card.c-ipv6 .stat-dot { background: var(--c-ipv6); }
        .stat-card.c-ipv4-warp .stat-count { color: var(--c-ipv4-warp); }
        .stat-card.c-ipv4-warp .stat-dot { background: var(--c-ipv4-warp); }
        .stat-card.c-ipv4-warp-ipv6 .stat-count { color: var(--c-ipv4-warp-ipv6); }
        .stat-card.c-ipv4-warp-ipv6 .stat-dot { background: var(--c-ipv4-warp-ipv6); }
        .stat-card.c-ipv6-warp .stat-count { color: var(--c-ipv6-warp); }
        .stat-card.c-ipv6-warp .stat-dot { background: var(--c-ipv6-warp); }
        .stat-card.c-ipv6-warp-ipv4 .stat-count { color: var(--c-ipv6-warp-ipv4); }
        .stat-card.c-ipv6-warp-ipv4 .stat-dot { background: var(--c-ipv6-warp-ipv4); }

        /* 工具栏 */
        .toolbar {
            display: flex; align-items: center; gap: 8px;
            padding: 0 12px 8px; flex-wrap: wrap;
        }
        .search-input {
            flex: 1; min-width: 120px; padding: 6px 10px;
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text-primary); font-size: 12px; outline: none;
        }
        .search-input:focus { border-color: var(--accent); }
        .search-input::placeholder { color: var(--text-tertiary); }
        .btn {
            padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px;
            background: var(--bg-tertiary); color: var(--text-primary); font-size: 12px;
            cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 4px;
        }
        .btn:hover { background: var(--bg-secondary); border-color: var(--accent); }
        .btn-sm { padding: 4px 10px; font-size: 11px; }
        .auto-refresh-label { font-size: 11px; color: var(--text-tertiary); display: flex; align-items: center; gap: 4px; }
        .toggle-switch { position: relative; width: 32px; height: 18px; cursor: pointer; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute; inset: 0; background: var(--bg-tertiary);
            border-radius: 9px; transition: 0.2s;
        }
        .toggle-slider::before {
            content: ''; position: absolute; width: 14px; height: 14px;
            left: 2px; top: 2px; background: var(--text-tertiary);
            border-radius: 50%; transition: 0.2s;
        }
        .toggle-switch input:checked + .toggle-slider { background: var(--accent); }
        .toggle-switch input:checked + .toggle-slider::before { transform: translateX(14px); background: #000; }

        /* 连接列表 */
        .conn-list { flex: 1; overflow-y: auto; padding: 0 12px 12px; }
        .conn-group { margin-bottom: 8px; }
        .conn-group-header {
            font-size: 11px; font-weight: 600; color: var(--text-secondary);
            padding: 4px 8px; background: var(--bg-secondary); border-radius: 6px;
            margin-bottom: 4px; display: flex; align-items: center; gap: 6px;
            position: sticky; top: 0; z-index: 10;
        }
        .conn-group-count { font-size: 10px; color: var(--text-tertiary); }
        .conn-item {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 10px; border-radius: 6px; font-size: 12px;
            transition: background 0.1s;
        }
        .conn-item:hover { background: var(--bg-secondary); }
        .conn-process {
            min-width: 80px; max-width: 120px; font-weight: 500;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .conn-host { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: flex; flex-direction: column; gap: 1px; min-width: 0; }
        .conn-hostname { font-size: 12px; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .conn-ip { font-size: 10px; color: var(--text-tertiary); font-family: 'Consolas', 'Monaco', monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .conn-badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600; white-space: nowrap; }

        /* 空状态 */
        .empty-hint { text-align: center; color: var(--text-tertiary); font-size: 12px; padding: 40px 20px; }

        /* 加载状态 */
        .loading-bar { height: 2px; background: var(--bg-tertiary); overflow: hidden; display: none; }
        .loading-bar.active { display: block; }
        .loading-bar::after {
            content: ''; display: block; width: 30%; height: 100%; background: var(--accent);
            animation: loading-slide 1s ease-in-out infinite;
        }
        @keyframes loading-slide { 0% { margin-left: -30%; } 100% { margin-left: 100%; } }

        /* Toast：默认用 opacity+visibility 彻底隐藏，避免空 toast 残留显示 */
        .toast {
            position: fixed; bottom: 16px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            opacity: 0; visibility: hidden;
            background: var(--bg-tertiary); color: var(--text-primary);
            padding: 8px 16px; border-radius: 8px; font-size: 12px;
            border: 1px solid var(--border);
            transition: transform 0.3s, opacity 0.3s, visibility 0.3s; z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; visibility: visible; }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题栏 -->
        <div class="title-bar pywebview-drag-region">
            <div>
                <span class="title-bar-text">网络流量监控</span>
                <span class="title-bar-info" id="warpInfo"></span>
            </div>
            <div class="title-bar-btns">
                <button class="title-bar-btn close" onclick="closeWindow()" title="关闭">
                    <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
        </div>

        <!-- 加载条 -->
        <div class="loading-bar" id="loadingBar"></div>

        <!-- 统计卡片 - 6 个 -->
        <div class="stats-grid">
            <div class="stat-card c-ipv4">
                <div class="stat-count" id="count-ipv4">0</div>
                <div class="stat-label"><span class="stat-dot"></span>IPv4 直连</div>
            </div>
            <div class="stat-card c-ipv6">
                <div class="stat-count" id="count-ipv6">0</div>
                <div class="stat-label"><span class="stat-dot"></span>IPv6 直连</div>
            </div>
            <div class="stat-card c-ipv4-warp">
                <div class="stat-count" id="count-ipv4_warp">0</div>
                <div class="stat-label"><span class="stat-dot"></span>IPv4-WARP→IPv4</div>
            </div>
            <div class="stat-card c-ipv4-warp-ipv6">
                <div class="stat-count" id="count-ipv4_warp_ipv6">0</div>
                <div class="stat-label"><span class="stat-dot"></span>IPv4-WARP→IPv6</div>
            </div>
            <div class="stat-card c-ipv6-warp">
                <div class="stat-count" id="count-ipv6_warp">0</div>
                <div class="stat-label"><span class="stat-dot"></span>IPv6-WARP→IPv6</div>
            </div>
            <div class="stat-card c-ipv6-warp-ipv4">
                <div class="stat-count" id="count-ipv6_warp_ipv4">0</div>
                <div class="stat-label"><span class="stat-dot"></span>IPv6-WARP→IPv4</div>
            </div>
        </div>

        <!-- 工具栏 -->
        <div class="toolbar">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索进程名/域名/IP..." oninput="renderConnections()">
            <label class="auto-refresh-label">
                <span class="toggle-switch">
                    <input type="checkbox" id="autoRefreshToggle" checked onchange="toggleAutoRefresh()">
                    <span class="toggle-slider"></span>
                </span>
                自动刷新
            </label>
            <button class="btn btn-sm" onclick="refresh()" id="refreshBtn">刷新</button>
        </div>

        <!-- 连接列表 -->
        <div class="conn-list" id="connList">
            <div class="empty-hint">正在获取网络连接...</div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        let api = window.pywebview ? window.pywebview.api : null;
        let lastData = null;
        let autoRefreshTimer = null;
        let _initStarted = false;
        let _loadingFast = false;  // fast 请求加载标志，防止自动刷新堆积
        let _loadingSlow = false;  // slow 请求加载标志，独立于 fast

        // 6 种分类配置
        // 标签格式：WARP[v4]→v4 表示 WARP 底层为 IPv4，内部传输 IPv4
        const ROUTE_LABELS = {
            'ipv4':            { text: 'IPv4 直连',    color: '#3b82f6', badgeClass: 'badge-ipv4' },
            'ipv6':            { text: 'IPv6 直连',    color: '#22C55E', badgeClass: 'badge-ipv6' },
            'ipv4_warp':       { text: 'WARP[v4]→v4',  color: '#F59E0B', badgeClass: 'badge-ipv4-warp' },
            'ipv4_warp_ipv6':  { text: 'WARP[v4]→v6',  color: '#EAB308', badgeClass: 'badge-ipv4-warp-ipv6' },
            'ipv6_warp':       { text: 'WARP[v6]→v6',  color: '#EF4444', badgeClass: 'badge-ipv6-warp' },
            'ipv6_warp_ipv4':  { text: 'WARP[v6]→v4',  color: '#A855F7', badgeClass: 'badge-ipv6-warp-ipv4' },
        };

        function waitForApi(timeoutMs) {
            timeoutMs = timeoutMs || 10000;
            return new Promise((resolve, reject) => {
                if (api) { resolve(); return; }
                const start = Date.now();
                const check = setInterval(() => {
                    if (window.pywebview && window.pywebview.api) {
                        api = window.pywebview.api;
                        clearInterval(check);
                        resolve();
                    } else if (Date.now() - start > timeoutMs) {
                        clearInterval(check);
                        reject(new Error('API 等待超时'));
                    }
                }, 100);
            });
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show';
            setTimeout(() => { t.className = 'toast'; }, 2000);
        }

        function closeWindow() {
            if (api && api.close_traffic_window) api.close_traffic_window();
        }

        async function refreshFast() {
            if (!api || _loadingFast) return;
            _loadingFast = true;
            const btn = document.getElementById('refreshBtn');
            const bar = document.getElementById('loadingBar');
            if (btn) btn.disabled = true;
            if (bar) bar.classList.add('active');
            try {
                const data = await api.get_traffic_status_fast();
                // 保留上一轮已解析的 hostname，避免自动刷新时域名闪失
                if (lastData && lastData.connections) {
                    const oldHost = new Map();
                    for (const c of lastData.connections) {
                        if (c.hostname) oldHost.set(c.remote_ip, c.hostname);
                    }
                    for (const c of data.connections) {
                        if (!c.hostname && oldHost.has(c.remote_ip)) {
                            c.hostname = oldHost.get(c.remote_ip);
                        }
                    }
                }
                lastData = data;
                renderStats(data.stats);
                renderWarpInfo(data.warp_underlay);
                renderConnections();
            } catch (e) {
                showToast('获取失败: ' + e);
                const container = document.getElementById('connList');
                if (container && (!lastData || !lastData.connections)) {
                    container.innerHTML = '<div class="empty-hint">获取数据失败，请点击刷新重试</div>';
                }
            } finally {
                _loadingFast = false;
                if (btn) btn.disabled = false;
                if (bar) bar.classList.remove('active');
            }
        }

        async function refreshSlow() {
            if (!api || _loadingSlow) return;
            _loadingSlow = true;
            try {
                const missingIps = [];
                for (const c of (lastData?.connections || [])) {
                    if (!c.hostname && c.remote_ip) missingIps.push(c.remote_ip);
                }
                if (missingIps.length === 0) return;
                const ipToHost = await api.get_traffic_status_slow(missingIps);
                let updated = false;
                for (const c of (lastData?.connections || [])) {
                    if (!c.hostname && ipToHost[c.remote_ip]) {
                        c.hostname = ipToHost[c.remote_ip];
                        updated = true;
                    }
                }
                if (updated) renderConnections();
            } catch (e) {
                console.warn('refreshSlow failed:', e);
            } finally {
                _loadingSlow = false;
            }
        }

        async function refresh() {
            const btn = document.getElementById('refreshBtn');
            const bar = document.getElementById('loadingBar');
            btn.disabled = true;
            bar.classList.add('active');
            try {
                const data = await api.get_traffic_status();
                lastData = data;
                renderStats(data.stats);
                renderWarpInfo(data.warp_underlay);
                renderConnections();
            } catch (e) {
                showToast('获取失败: ' + e);
                const container = document.getElementById('connList');
                if (container && (!lastData || !lastData.connections)) {
                    container.innerHTML = '<div class="empty-hint">获取数据失败，请点击刷新重试</div>';
                }
            }
            btn.disabled = false;
            bar.classList.remove('active');
        }

        function renderStats(stats) {
            for (const key of Object.keys(ROUTE_LABELS)) {
                const el = document.getElementById('count-' + key);
                if (el) el.textContent = stats[key] || 0;
            }
        }

        function renderWarpInfo(underlay) {
            const el = document.getElementById('warpInfo');
            if (el && underlay) {
                el.textContent = 'WARP 底层: ' + (underlay === 'ipv6' ? 'IPv6' : 'IPv4');
            }
        }

        function renderConnections() {
            const container = document.getElementById('connList');
            if (!lastData || !lastData.connections || !lastData.connections.length) {
                container.innerHTML = '<div class="empty-hint">暂无活动 TCP 连接</div>';
                return;
            }

            const keyword = (document.getElementById('searchInput').value || '').trim().toLowerCase();
            let conns = lastData.connections;
            if (keyword) {
                conns = conns.filter(c =>
                    (c.process || '').toLowerCase().includes(keyword) ||
                    (c.remote_ip || '').toLowerCase().includes(keyword) ||
                    (c.hostname || '').toLowerCase().includes(keyword)
                );
            }

            if (!conns.length) {
                container.innerHTML = '<div class="empty-hint">无匹配的连接</div>';
                return;
            }

            // 按进程名分组
            const groups = {};
            conns.forEach(c => {
                const key = c.process || 'unknown';
                if (!groups[key]) groups[key] = [];
                groups[key].push(c);
            });

            let html = '';
            const sortedGroups = Object.keys(groups).sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
            for (const procName of sortedGroups) {
                const groupConns = groups[procName];
                html += `<div class="conn-group">`;
                html += `<div class="conn-group-header">${escapeHtml(procName)} <span class="conn-group-count">${groupConns.length}</span></div>`;
                for (const c of groupConns) {
                    const label = ROUTE_LABELS[c.route_type] || ROUTE_LABELS['ipv4'];
                    const hostDisplay = c.hostname ? escapeHtml(c.hostname) : '(无域名)';
                    html += `<div class="conn-item">
                        <span class="conn-process">${escapeHtml(c.process)}</span>
                        <span class="conn-host">
                            <span class="conn-hostname">${hostDisplay}</span>
                            <span class="conn-ip">${escapeHtml(c.remote_ip)}:${c.remote_port}</span>
                        </span>
                        <span class="conn-badge ${label.badgeClass}">${label.text}</span>
                    </div>`;
                }
                html += `</div>`;
            }
            container.innerHTML = html;
        }

        function escapeHtml(s) {
            if (!s) return '';
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function toggleAutoRefresh() {
            const enabled = document.getElementById('autoRefreshToggle').checked;
            if (enabled) { startAutoRefresh(); } else { stopAutoRefresh(); }
        }

        function startAutoRefresh() {
            stopAutoRefresh();
            autoRefreshTimer = setInterval(refreshFast, 3000);
        }

        function stopAutoRefresh() {
            if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
        }

        async function init() {
            if (_initStarted) return;
            _initStarted = true;
            try {
                await waitForApi(15000);
            } catch (e) {
                document.getElementById('connList').innerHTML =
                    '<div class="empty-hint">API 加载超时，请关闭窗口重试</div>';
                showToast('API 加载超时: ' + e.message);
                return;
            }
            await refreshFast();        // 先拿 fast 数据，立即渲染
            refreshSlow();              // 后台异步，拿到域名后增量更新
            startAutoRefresh();         // 自动刷新改为 fast-only
        }

        window.addEventListener('pywebviewready', init);
        setTimeout(() => { if (window.pywebview && window.pywebview.api && !_initStarted) init(); }, 1000);

        // 窗口隐藏时停止轮询以节省资源，显示时恢复
        let _wasAutoBeforeHide = false;
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                _wasAutoBeforeHide = !!autoRefreshTimer;
                stopAutoRefresh();
            } else {
                if (_wasAutoBeforeHide) startAutoRefresh();
                refresh();
            }
        });
    </script>

    <style>
        /* badge 颜色 */
        .badge-ipv4 { background: rgba(59,130,246,0.15); color: var(--c-ipv4); }
        .badge-ipv6 { background: rgba(34,197,94,0.15); color: var(--c-ipv6); }
        .badge-ipv4-warp { background: rgba(245,158,11,0.15); color: var(--c-ipv4-warp); }
        .badge-ipv4-warp-ipv6 { background: rgba(234,179,8,0.15); color: var(--c-ipv4-warp-ipv6); }
        .badge-ipv6-warp { background: rgba(239,68,68,0.15); color: var(--c-ipv6-warp); }
        .badge-ipv6-warp-ipv4 { background: rgba(168,85,247,0.15); color: var(--c-ipv6-warp-ipv4); }
    </style>
</body>
</html>
