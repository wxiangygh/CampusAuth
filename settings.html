<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>CampusAuth</title>
    <style>
        :root {
            --bg-primary: #0D0D0D;
            --bg-secondary: #1A1A1A;
            --bg-tertiary: #262626;
            --accent: #F68320;
            --accent-dim: rgba(246,131,32,0.15);
            --text-primary: #FFFFFF;
            --text-secondary: #A3A3A3;
            --text-tertiary: #737373;
            --border: rgba(255,255,255,0.08);
            --success: #22C55E;
            --error: #EF4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.4s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        .loading-text {
            font-size: 13px;
            color: var(--text-tertiary);
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Container */
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Tab Bar */
        .tab-bar {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: var(--bg-primary);
            padding: 0 20px;
        }

        .tab-btn {
            padding: 14px 0;
            margin-right: 24px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-tertiary);
            border: none;
            background: none;
            cursor: pointer;
            position: relative;
            transition: color 0.15s;
            outline: none;
            letter-spacing: 0.3px;
        }

        .tab-btn:last-child {
            margin-right: 0;
        }

        .tab-btn.active {
            color: var(--text-primary);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
            border-radius: 1px;
        }

        /* Tab Content */
        .tab-content {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow-y: auto;
        }

        .tab-content.active {
            display: flex;
        }

        /* Status Page */
        .status-page {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 32px 24px 32px;
            position: relative;
        }

        /* Status Indicator - Hexagon Shape */
        .status-indicator {
            position: relative;
            width: 140px;
            height: 160px;
            margin-bottom: 22px;
        }

        .hexagon-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .hexagon-shape {
            fill: var(--bg-tertiary);
            stroke: var(--border);
            stroke-width: 1;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .status-indicator.idle .hexagon-shape {
            fill: var(--bg-tertiary);
            stroke: var(--border);
        }

        .status-indicator.normal .hexagon-shape {
            fill: rgba(34, 197, 94, 0.15);
            stroke: rgba(34, 197, 94, 0.4);
            filter: drop-shadow(0 0 20px rgba(34, 197, 94, 0.2));
        }

        .status-indicator.running .hexagon-shape {
            fill: var(--accent-dim);
            stroke: var(--accent);
            filter: drop-shadow(0 0 30px rgba(246, 131, 32, 0.3));
            animation: hexPulse 1.5s ease-in-out infinite;
        }

        .status-indicator.success .hexagon-shape {
            fill: var(--accent-dim);
            stroke: var(--accent);
            filter: drop-shadow(0 0 30px rgba(246, 131, 32, 0.3));
        }

        .status-indicator.error .hexagon-shape {
            fill: rgba(239, 68, 68, 0.15);
            stroke: rgba(239, 68, 68, 0.5);
            filter: drop-shadow(0 0 20px rgba(239, 68, 68, 0.2));
        }

        @keyframes hexPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .hexagon-rotate {
            position: absolute;
            inset: -8px;
            width: calc(100% + 16px);
            height: calc(100% + 16px);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .status-indicator.running .hexagon-rotate,
        .status-indicator.success .hexagon-rotate {
            opacity: 1;
        }

        .hexagon-rotate-line {
            fill: none;
            stroke: var(--accent);
            stroke-width: 1;
            stroke-dasharray: 8 4;
            opacity: 0.4;
            animation: hexRotate 8s linear infinite;
            transform-origin: center;
        }

        @keyframes hexRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .status-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .status-icon svg {
            width: 28px;
            height: 28px;
            stroke: var(--text-primary);
            stroke-width: 1.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .status-indicator.running .status-icon svg {
            animation: iconSpin 2s linear infinite;
        }

        @keyframes iconSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Status Text */
        .status-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .status-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            text-align: center;
        }

        .status-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 24px;
            min-height: 20px;
            font-weight: 400;
        }

        /* Progress Bar */
        .progress-container {
            width: 200px;
            position: relative;
            margin-bottom: 20px;
            display: none;
        }

        .progress-container.active {
            display: block;
        }

        .progress-track {
            width: 100%;
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 20px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
            border-radius: 2px;
        }

        .progress-fill.success { background: var(--accent); }
        .progress-fill.error { background: var(--error); }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
        }

        .progress-text {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
        }

        .progress-label {
            font-size: 10px;
            color: var(--text-tertiary);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Action Buttons */
        .status-actions {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 280px;
        }

        .btn {
            flex: 1;
            padding: 12px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.16, 1, 0.3, 1);
            outline: none;
            letter-spacing: 0.2px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--accent);
            color: var(--text-primary);
            border-color: var(--accent);
        }

        .btn-primary:hover {
            background: #E8751A;
            border-color: #E8751A;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-secondary);
            border-color: var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            color: var(--error);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* Settings Page */
        .settings-page {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px 20px;
            overflow: hidden;
        }

        .form-group {
            margin-bottom: 6px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-tertiary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: all 0.15s;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        input::placeholder {
            color: var(--text-tertiary);
        }

        .input-row {
            display: flex;
            gap: 8px;
        }

        .input-row input {
            flex: 1;
            min-width: 0;
        }

        .btn-icon {
            padding: 8px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-secondary);
            transition: all 0.15s;
            white-space: nowrap;
            font-weight: 500;
        }

        .btn-icon:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-color: var(--text-tertiary);
        }

        .toggle-card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            min-height: 64px;
        }

        .toggle-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .toggle-card-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .toggle-card-tip {
            font-size: 11px;
            color: var(--text-tertiary);
            line-height: 1.3;
            margin-top: 4px;
        }

        .toggle {
            position: relative;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            transition: 0.2s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 2px;
            bottom: 2px;
            background-color: var(--text-secondary);
            transition: 0.2s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        input:checked + .toggle-slider:before {
            transform: translateX(20px);
            background-color: white;
        }

        /* Dropdown */
        .dropdown {
            position: relative;
        }

        .dropdown-list {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            max-height: 160px;
            overflow-y: auto;
            z-index: 10;
        }

        .dropdown-list.active {
            display: block;
        }

        .dropdown-item {
            padding: 10px 14px;
            cursor: pointer;
            transition: background 0.1s;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .dropdown-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .dropdown-empty {
            padding: 16px;
            text-align: center;
            color: var(--text-tertiary);
            font-size: 12px;
        }

        /* Title Bar */
        .title-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 36px;
            padding: 0 12px;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            -webkit-app-region: drag;
            user-select: none;
        }

        .title-bar-text {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }

        .title-bar-btns {
            display: flex;
            gap: 6px;
            -webkit-app-region: no-drag;
        }

        .title-bar-btn {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-tertiary);
            transition: all 0.15s;
            padding: 0;
        }

        .title-bar-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }

        .title-bar-btn.close:hover {
            background: rgba(239, 68, 68, 0.2);
            color: var(--error);
        }

        .title-bar-btn svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Alert */
        .alert {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }

        .alert.active {
            display: flex;
        }

        .alert-card {
            background: var(--bg-secondary);
            padding: 24px;
            border-radius: 12px;
            max-width: 320px;
            width: calc(100% - 48px);
            border: 1px solid var(--border);
        }

        .alert-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        #alertIcon svg {
            width: 20px;
            height: 20px;
        }

        .alert-message {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .alert-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            background: var(--accent);
            color: white;
            transition: background 0.15s;
        }

        .alert-btn:hover {
            background: #E8751A;
        }

        /* Particle Canvas */
        .particle-canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <!-- Title Bar -->
    <div class="title-bar">
        <div class="title-bar-text">CampusAuth</div>
        <div class="title-bar-btns">
            <button class="title-bar-btn" onclick="minimizeWindow()" title="最小化">
                <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <button class="title-bar-btn close" onclick="closeWindow()" title="关闭">
                <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在启动...</div>
    </div>

    <div class="container">
        <!-- Tab Bar -->
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('status')">连接</button>
            <button class="tab-btn" onclick="switchTab('settings')">设置</button>
        </div>

        <!-- Status Tab -->
        <div class="tab-content active" id="tab-status">
            <div class="status-page">
                <canvas class="particle-canvas" id="particleCanvas" width="300" height="300"></canvas>

                <div class="status-indicator idle" id="statusIndicator">
                    <svg class="hexagon-svg" viewBox="0 0 140 140">
                        <polygon class="hexagon-shape" points="70,5 125,35 125,105 70,135 15,105 15,35"/>
                    </svg>
                    <svg class="hexagon-rotate" viewBox="0 0 156 156">
                        <polygon class="hexagon-rotate-line" points="78,5 141,39 141,117 78,151 15,117 15,39"/>
                    </svg>
                    <div class="status-icon" id="statusIcon">
                        <svg viewBox="0 0 24 24"><path d="M1 1l22 22"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.56 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1"/></svg>
                    </div>
                </div>

                <div class="status-label" id="statusLabel">STATUS</div>
                <div class="status-title" id="statusTitle">一键认证</div>
                <div class="status-subtitle" id="statusSubtitle">点击下方按钮开始认证</div>

                <div class="progress-container" id="progressContainer">
                    <div class="progress-track">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                    <div class="progress-info">
                        <div class="progress-label" id="progressLabelText">认证中</div>
                        <div class="progress-text" id="progressText">0%</div>
                    </div>
                </div>

                <div class="status-actions">
                    <button class="btn btn-primary" id="authBtn" onclick="startAuth()">开始认证</button>
                    <button class="btn btn-secondary" id="restoreBtn" onclick="startRestore()">恢复网络</button>
                    <button class="btn btn-danger" id="cancelBtn" onclick="cancelOperation()" style="display:none;">取消</button>
                </div>
            </div>
        </div>

        <!-- Settings Tab -->
        <div class="tab-content" id="tab-settings">
            <div class="settings-page">
                <div class="form-group">
                    <label>WiFi 网络</label>
                    <div class="dropdown">
                        <div class="input-row">
                            <input type="text" id="wifiName" placeholder="选择或输入WiFi名称" />
                            <button class="btn-icon" id="refreshBtn" onclick="refreshWifi()">扫描</button>
                        </div>
                        <div class="dropdown-list" id="wifiDropdown"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>认证账号</label>
                    <input type="text" id="username" placeholder="输入上网账号" />
                </div>

                <div class="form-group">
                    <label>认证密码</label>
                    <div class="input-row">
                        <input type="password" id="password" placeholder="输入账号密码" />
                        <button class="btn-icon" id="showPassBtn" onclick="togglePassword()">显示</button>
                    </div>
                </div>

                <div class="form-group">
                    <div style="display:flex;gap:8px;">
                        <div class="toggle-card" style="flex:1;">
                            <div class="toggle-card-header">
                                <span class="toggle-card-title">自动认证</span>
                                <label class="toggle">
                                    <input type="checkbox" id="autoAuth">
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                            <div class="toggle-card-tip">WiFi后自动认证</div>
                        </div>
                        <div class="toggle-card" style="flex:1;">
                            <div class="toggle-card-header">
                                <span class="toggle-card-title">开机自启</span>
                                <label class="toggle">
                                    <input type="checkbox" id="autoStartup">
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                            <div class="toggle-card-tip">登录后自动启动</div>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <div style="display:flex;gap:8px;">
                        <div class="toggle-card" style="flex:1;">
                            <div class="toggle-card-header">
                                <span class="toggle-card-title">自动恢复</span>
                                <label class="toggle">
                                    <input type="checkbox" id="autoRestore">
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                            <div class="toggle-card-tip">切换WiFi后自动恢复网络</div>
                        </div>
                        <div class="toggle-card" style="flex:1;">
                            <div class="toggle-card-header">
                                <span class="toggle-card-title">静默启动</span>
                                <label class="toggle">
                                    <input type="checkbox" id="silentStartup">
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                            <div class="toggle-card-tip">开机自启时不显示主窗口</div>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>WARP-CLI 路径</label>
                    <div class="input-row">
                        <input type="text" id="warpCliPath" placeholder="留空则自动检测" />
                        <button class="btn-icon" id="browseWarpBtn" onclick="browseWarpPath()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Alert -->
    <div class="alert" id="alertOverlay">
        <div class="alert-card">
            <div class="alert-title" id="alertTitle">
                <span id="alertIcon"></span>
                <span id="alertTitleText">成功</span>
            </div>
            <div class="alert-message" id="alertMessage"></div>
            <button class="alert-btn" onclick="closeAlert()">确定</button>
        </div>
    </div>

    <script>
        // ===== Tab Switching =====
        function switchTab(name) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-' + name).classList.add('active');
            event.target.classList.add('active');
        }

        function switchToTab(name) {
            const tabs = document.querySelectorAll('.tab-btn');
            const contents = document.querySelectorAll('.tab-content');
            const idx = name === 'settings' ? 1 : 0;
            tabs.forEach((b, i) => b.classList.toggle('active', i === idx));
            contents.forEach((c, i) => c.classList.toggle('active', i === idx));
        }

        // ===== Initialization =====
        window.addEventListener('pywebviewready', async () => {
            try {
                const config = await window.pywebview.api.load_config();
                document.getElementById('wifiName').value = config.wifi_name || '';
                document.getElementById('username').value = config.username || '';
                document.getElementById('password').value = config.password || '';
                document.getElementById('autoAuth').checked = config.auto_auth || false;
                document.getElementById('autoRestore').checked = config.auto_restore || false;
                document.getElementById('warpCliPath').value = config.warp_cli_path || '';
                document.getElementById('silentStartup').checked = config.silent_startup || false;
            } catch (e) { console.error('Failed to load config:', e); }

            setTimeout(async () => {
                try {
                    const status = await window.pywebview.api.check_network_status();
                    updateStatusFromCheck(status);
                } catch (e) { console.error('Failed to check network status:', e); }
                try {
                    const startup = await window.pywebview.api.get_startup_status();
                    document.getElementById('autoStartup').checked = startup.enabled || false;
                } catch (e) { console.error('Failed to get startup status:', e); }
                document.getElementById('loadingOverlay').classList.add('hidden');
            }, 100);
        });

        // ===== Status Management =====
        function updateStatusFromCheck(status) {
            if (_authRunning) return;
            hideProgress();
            const authBtn = document.getElementById('authBtn');
            const restoreBtn = document.getElementById('restoreBtn');

            if (status.status === 'connected') {
                setStatus('success', 'WARP已连接', status.message, 'check');
                authBtn.disabled = true;
                restoreBtn.disabled = false;
            } else if (status.status === 'partial') {
                setStatus('running', '部分连接', status.message, 'warn');
                authBtn.disabled = false;
                restoreBtn.disabled = false;
            } else if (status.status === 'broken') {
                setStatus('error', '网络异常', status.message, 'cross');
                authBtn.disabled = false;
                restoreBtn.disabled = false;
            } else if (status.status === 'normal') {
                setStatus('normal', '正常模式', status.message, 'check');
                authBtn.disabled = false;
                restoreBtn.disabled = true;
            } else {
                setStatus('idle', '校园网助手', '点击下方按钮开始认证', 'wifi');
                authBtn.disabled = false;
                restoreBtn.disabled = true;
            }
        }

        const STATUS_ICONS = {
            wifi: '<svg viewBox="0 0 24 24"><path d="M1 1l22 22"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.56 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1"/></svg>',
            check: '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>',
            cross: '<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
            loader: '<svg viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>',
            warn: '<svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'
        };

        function setStatus(state, title, subtitle, iconKey) {
            const indicator = document.getElementById('statusIndicator');
            indicator.className = 'status-indicator ' + state;

            const iconEl = document.getElementById('statusIcon');
            iconEl.innerHTML = STATUS_ICONS[iconKey] || STATUS_ICONS.wifi;

            document.getElementById('statusTitle').textContent = title;
            document.getElementById('statusSubtitle').textContent = subtitle;
        }

        // ===== Progress Bar =====
        function showProgress(pct, label) {
            const container = document.getElementById('progressContainer');
            const fill = document.getElementById('progressFill');
            const text = document.getElementById('progressText');
            const labelEl = document.getElementById('progressLabelText');

            container.classList.add('active');
            if (fill) fill.style.width = pct + '%';
            if (text) text.textContent = Math.round(pct) + '%';
            if (labelEl && label) labelEl.textContent = label;
        }

        function hideProgress() {
            document.getElementById('progressContainer').classList.remove('active');
            const fill = document.getElementById('progressFill');
            if (fill) fill.style.width = '0%';
        }

        // ===== Auth Operations =====
        let _authRunning = false;
        let _currentAction = null;

        function finishAuth(success, message, action) {
            _authRunning = false;
            _currentAction = null;
            stopParticles();

            document.getElementById('authBtn').textContent = '开始认证';
            document.getElementById('authBtn').onclick = startAuth;
            document.getElementById('authBtn').disabled = true;
            document.getElementById('restoreBtn').textContent = '恢复网络';
            document.getElementById('restoreBtn').onclick = startRestore;
            document.getElementById('restoreBtn').disabled = true;
            document.getElementById('cancelBtn').style.display = 'none';

            const isCancelled = (message === '已取消');
            if (success) {
                if (action === 'restore') {
                    setStatus('normal', '恢复成功', message, 'check');
                } else {
                    setStatus('success', '认证成功', message, 'check');
                }
                showProgress(100, '完成');
            } else if (isCancelled) {
                setStatus('idle', '已取消', '操作已取消', 'wifi');
                showProgress(100, '已取消');
            } else {
                setStatus('error', action === 'restore' ? '恢复失败' : '认证失败', message, 'cross');
                showProgress(100, '失败');
            }

            setTimeout(() => {
                if (_authRunning) return;
                window.pywebview.api.check_network_status().then(s => {
                    if (!_authRunning) updateStatusFromCheck(s);
                }).catch(() => {
                    document.getElementById('authBtn').disabled = false;
                    document.getElementById('restoreBtn').disabled = false;
                });
            }, 1500);
        }

        function onAuthProgress(data) {
            const { step, total, message, status, action } = data;

            if (status === 'success') { finishAuth(true, message, action); return; }
            if (status === 'error') { finishAuth(false, message, action); return; }
            if (status === 'cancelled') {
                if (!_authRunning) return;
                finishAuth(false, message || '已取消', action);
                return;
            }

            const label = action === 'restore' ? '恢复中' : '认证中';
            setStatus('running', label + '...', message, 'loader');
            showProgress(Math.round((step / total) * 100), label);
            startParticles();

            // Auto-auth from backend: show cancel button
            if (!_authRunning) {
                _authRunning = true;
                _currentAction = action || 'auth';
                document.getElementById('authBtn').disabled = true;
                document.getElementById('restoreBtn').disabled = true;
                document.getElementById('cancelBtn').style.display = '';
            }
        }

        async function startAuth() {
            if (_authRunning) { await cancelOperation(); return; }
            _authRunning = true;
            _currentAction = 'auth';
            document.getElementById('authBtn').disabled = true;
            document.getElementById('restoreBtn').disabled = true;
            document.getElementById('cancelBtn').style.display = '';

            setStatus('running', '认证中...', '正在准备...', 'loader');
            showProgress(0, '认证中');
            startParticles();

            try { await window.pywebview.api.test_auth(); }
            catch (e) { finishAuth(false, e.message); }
        }

        async function startRestore() {
            if (_authRunning) { await cancelOperation(); return; }
            _authRunning = true;
            _currentAction = 'restore';
            document.getElementById('authBtn').disabled = true;
            document.getElementById('restoreBtn').disabled = true;
            document.getElementById('cancelBtn').style.display = '';

            setStatus('running', '恢复中...', '正在恢复正常网络模式...', 'loader');
            showProgress(0, '恢复中');
            startParticles();

            try { await window.pywebview.api.restore_network(); }
            catch (e) { finishAuth(false, e.message); }
        }

        async function cancelOperation() {
            try { await window.pywebview.api.cancel_operation(); }
            catch (e) { console.error('cancel failed:', e); }
            finishAuth(false, '已取消', _currentAction);
        }

        // ===== Particle Animation =====
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animRunning = false;

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.angle = Math.random() * Math.PI * 2;
                this.radius = 60 + Math.random() * 50;
                this.speed = 0.005 + Math.random() * 0.01;
                this.size = 0.5 + Math.random() * 1.5;
                this.opacity = 0.1 + Math.random() * 0.4;
                this.cx = 150;
                this.cy = 150;
            }
            update() { this.angle += this.speed; }
            draw(ctx) {
                const x = this.cx + Math.cos(this.angle) * this.radius;
                const y = this.cy + Math.sin(this.angle) * this.radius;
                ctx.beginPath();
                ctx.arc(x, y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(246, 131, 32, ${this.opacity})`;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 30; i++) particles.push(new Particle());
        }

        function animateParticles() {
            if (!animRunning) return;
            ctx.clearRect(0, 0, 300, 300);
            particles.forEach(p => { p.update(); p.draw(ctx); });
            requestAnimationFrame(animateParticles);
        }

        function startParticles() {
            if (animRunning) return;
            animRunning = true;
            initParticles();
            animateParticles();
        }

        function stopParticles() {
            animRunning = false;
            ctx.clearRect(0, 0, 300, 300);
        }

        // ===== Settings =====
        let _autoSaveTimer;
        function _doAutoSave() {
            var config = {
                wifi_name: document.getElementById('wifiName').value.trim(),
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value,
                auto_auth: document.getElementById('autoAuth').checked,
                auto_restore: document.getElementById('autoRestore').checked,
                warp_cli_path: document.getElementById('warpCliPath').value.trim(),
                silent_startup: document.getElementById('silentStartup').checked
            };
            window.pywebview.api.auto_save_form(config);
        }

        ['wifiName', 'username', 'password', 'warpCliPath'].forEach(function(id) {
            var el = document.getElementById(id);
            if (el) {
                el.addEventListener('input', function() {
                    clearTimeout(_autoSaveTimer);
                    _autoSaveTimer = setTimeout(_doAutoSave, 500);
                });
            }
        });

        document.getElementById('autoAuth')?.addEventListener('change', () => { clearTimeout(_autoSaveTimer); _doAutoSave(); });
        document.getElementById('autoRestore')?.addEventListener('change', () => { clearTimeout(_autoSaveTimer); _doAutoSave(); });
        document.getElementById('autoStartup')?.addEventListener('change', async function() {
            const enabled = this.checked;
            try {
                const result = await window.pywebview.api.set_startup(enabled);
                if (!result.success) {
                    this.checked = !enabled;
                    showAlert('提示', result.message, 'warning');
                }
            } catch (e) {
                this.checked = !enabled;
                showAlert('错误', '设置失败: ' + e.message, 'error');
            }
        });
        document.getElementById('silentStartup')?.addEventListener('change', async function() {
            clearTimeout(_autoSaveTimer); _doAutoSave();
            try { await window.pywebview.api.refresh_startup_task(); }
            catch (e) { console.error('refresh_startup_task failed:', e); }
        });
        window.addEventListener('beforeunload', () => _doAutoSave());

        // ===== WiFi Dropdown =====
        const wifiInput = document.getElementById('wifiName');
        const wifiDropdown = document.getElementById('wifiDropdown');

        wifiInput.addEventListener('focus', () => {
            if (wifiDropdown.querySelectorAll('.dropdown-item').length > 0) {
                wifiDropdown.classList.add('active');
            }
        });

        wifiInput.addEventListener('input', () => {
            const filter = wifiInput.value.toLowerCase();
            const items = wifiDropdown.querySelectorAll('.dropdown-item');
            let hasVisible = false;
            items.forEach(item => {
                item.style.display = item.textContent.toLowerCase().includes(filter) ? '' : 'none';
                if (item.style.display !== 'none') hasVisible = true;
            });
            wifiDropdown.classList.toggle('active', hasVisible);
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.dropdown')) wifiDropdown.classList.remove('active');
        });

        let _knownNetworks = [];
        let _scanPollTimer = null;
        let _scanPollCount = 0;
        const _scanMaxPolls = 6;
        const _scanInterval = 3000;

        function _addWifiItem(ssid) {
            if (_knownNetworks.includes(ssid)) return;
            _knownNetworks.push(ssid);
            const empty = wifiDropdown.querySelector('.dropdown-empty');
            if (empty) empty.remove();
            const div = document.createElement('div');
            div.className = 'dropdown-item';
            div.textContent = ssid;
            div.onclick = () => {
                wifiInput.value = ssid;
                wifiDropdown.classList.remove('active');
                clearTimeout(_autoSaveTimer);
                _doAutoSave();
            };
            wifiDropdown.appendChild(div);
            wifiDropdown.classList.add('active');
        }

        async function _pollWifi() {
            try {
                const networks = await window.pywebview.api.poll_wifi();
                networks.forEach(ssid => _addWifiItem(ssid));
            } catch (e) { console.error('WiFi poll error:', e); }
            _scanPollCount++;
            if (_scanPollCount < _scanMaxPolls) {
                _scanPollTimer = setTimeout(_pollWifi, _scanInterval);
            } else {
                const btn = document.getElementById('refreshBtn');
                btn.disabled = false;
                btn.textContent = '扫描';
                btn.style.opacity = '1';
                if (_knownNetworks.length === 0) {
                    const div = document.createElement('div');
                    div.className = 'dropdown-empty';
                    div.textContent = '未找到WiFi网络';
                    wifiDropdown.appendChild(div);
                }
            }
        }

        async function refreshWifi() {
            if (_scanPollTimer) { clearTimeout(_scanPollTimer); _scanPollTimer = null; }
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.textContent = '扫描中...';
            btn.style.opacity = '0.6';
            _knownNetworks = [];
            _scanPollCount = 0;
            wifiDropdown.innerHTML = '';
            wifiDropdown.classList.remove('active');

            try {
                const firstBatch = await window.pywebview.api.scan_wifi();
                firstBatch.forEach(ssid => _addWifiItem(ssid));
                _pollWifi();
            } catch (e) {
                console.error('Failed to start wifi scan:', e);
                const div = document.createElement('div');
                div.className = 'dropdown-empty';
                div.textContent = '扫描失败';
                wifiDropdown.appendChild(div);
                btn.disabled = false;
                btn.textContent = '扫描';
                btn.style.opacity = '1';
            }
        }

        function togglePassword() {
            const input = document.getElementById('password');
            const btn = document.getElementById('showPassBtn');
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '隐藏';
            } else {
                input.type = 'password';
                btn.textContent = '显示';
            }
        }

        async function browseWarpPath() {
            try {
                const path = await window.pywebview.api.browse_folder('选择 warp-cli.exe');
                if (path) {
                    document.getElementById('warpCliPath').value = path;
                    clearTimeout(_autoSaveTimer);
                    _doAutoSave();
                }
            } catch (e) { console.error('browseWarpPath failed:', e); }
        }

        // ===== Alert =====
        function showAlert(title, message, type) {
            const icons = {
                success: '<svg viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
                error: '<svg viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
                warning: '<svg viewBox="0 0 24 24" fill="none" stroke="#F68320" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'
            };
            document.getElementById('alertIcon').innerHTML = icons[type] || icons.success;
            document.getElementById('alertTitleText').textContent = title;
            document.getElementById('alertMessage').textContent = message;
            document.getElementById('alertOverlay').classList.add('active');
        }

        function closeAlert() {
            document.getElementById('alertOverlay').classList.remove('active');
        }

        // ===== Window Controls =====
        function minimizeWindow() {
            try {
                window.pywebview.api.minimize_window();
            } catch (e) {
                console.error('minimizeWindow failed:', e);
            }
        }

        function closeWindow() {
            try {
                window.pywebview.api.close_window();
            } catch (e) {
                console.error('closeWindow failed:', e);
            }
        }
    </script>
</body>
</html>
